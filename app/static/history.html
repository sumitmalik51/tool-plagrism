<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scan History — PlagiarismGuard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/static/js/common.js" defer></script>
  <script src="/static/js/auth.js" defer></script>
  <link rel="stylesheet" href="/static/css/theme.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4" defer></script>
  <style>
    .risk-badge { @apply px-2 py-0.5 rounded-full text-xs font-bold uppercase; }
    .risk-LOW { @apply bg-green-500/20 text-green-400; }
    .risk-MEDIUM { @apply bg-yellow-500/20 text-yellow-400; }
    .risk-HIGH { @apply bg-red-500/20 text-red-400; }
  </style>
</head>
<body class="bg-bg text-txt min-h-screen">

  <!-- Navbar -->
  <nav class="fixed top-0 left-0 right-0 z-50 bg-bg/80 backdrop-blur-xl border-b border-border/50">
    <div class="max-w-7xl mx-auto px-4 h-14 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 text-lg font-bold">
        <svg viewBox="0 0 40 40" class="w-7 h-7" xmlns="http://www.w3.org/2000/svg"><rect width="40" height="40" rx="8" fill="#4F46E5"/><rect x="10" y="7" width="18" height="24" rx="2" fill="white"/><path d="M22 7v6h6" fill="#E0E7FF"/><rect x="13" y="15" width="12" height="1.5" rx=".75" fill="#A5B4FC"/><rect x="13" y="19" width="10" height="1.5" rx=".75" fill="#A5B4FC"/><rect x="13" y="23" width="8" height="1.5" rx=".75" fill="#A5B4FC"/><circle cx="26" cy="27" r="7" fill="#22C55E"/><path d="M23 27l2 2 4-4" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        PlagiarismGuard
      </a>
      <div class="flex items-center gap-3">
        <a href="/app" class="text-sm text-txt/60 hover:text-primary">Dashboard</a>
        <a href="/app#history" class="text-sm text-primary font-medium">History</a>
        <button onclick="toggleTheme()" class="p-2 rounded-lg hover:bg-border/30">🌓</button>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 pt-20 pb-12">
    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
      <div>
        <h1 class="text-2xl font-bold">Scan History</h1>
        <p class="text-txt/50 text-sm mt-1">Track all your plagiarism scans with visual analytics</p>
      </div>
      <div class="flex gap-2">
        <button id="btnExportCSV" class="px-4 py-2 rounded-lg bg-border/30 hover:bg-border/50 text-sm flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          Export CSV
        </button>
        <button id="btnRefresh" class="px-4 py-2 rounded-lg bg-primary text-white text-sm hover:bg-primary/80">
          ↻ Refresh
        </button>
      </div>
    </div>

    <!-- Chart Cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
      <!-- Score Trend -->
      <div class="md:col-span-2 bg-card border border-border/30 rounded-xl p-4">
        <h3 class="text-sm font-medium text-txt/60 mb-3">Score Trend</h3>
        <canvas id="chartTrend" height="120"></canvas>
      </div>
      <!-- Risk Distribution -->
      <div class="bg-card border border-border/30 rounded-xl p-4">
        <h3 class="text-sm font-medium text-txt/60 mb-3">Risk Distribution</h3>
        <canvas id="chartRisk" height="180"></canvas>
      </div>
    </div>

    <!-- Daily Activity -->
    <div class="bg-card border border-border/30 rounded-xl p-4 mb-8">
      <h3 class="text-sm font-medium text-txt/60 mb-3">Daily Scan Activity (Last 30 Days)</h3>
      <canvas id="chartDaily" height="60"></canvas>
    </div>

    <!-- Filters -->
    <div class="flex flex-wrap gap-3 mb-4">
      <input id="filterSearch" type="text" placeholder="Search by filename..." class="px-3 py-2 rounded-lg bg-bg border border-border/30 text-sm flex-1 min-w-[200px]" />
      <select id="filterRisk" class="px-3 py-2 rounded-lg bg-bg border border-border/30 text-sm">
        <option value="">All Risk Levels</option>
        <option value="LOW">Low</option>
        <option value="MEDIUM">Medium</option>
        <option value="HIGH">High</option>
      </select>
      <select id="filterSort" class="px-3 py-2 rounded-lg bg-bg border border-border/30 text-sm">
        <option value="created_at_desc">Newest First</option>
        <option value="created_at_asc">Oldest First</option>
        <option value="plagiarism_score_desc">Highest Score</option>
        <option value="plagiarism_score_asc">Lowest Score</option>
      </select>
    </div>

    <!-- Scan Table -->
    <div class="bg-card border border-border/30 rounded-xl overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-border/10">
            <tr>
              <th class="text-left px-4 py-3 text-txt/50 font-medium">Document</th>
              <th class="text-left px-4 py-3 text-txt/50 font-medium">Score</th>
              <th class="text-left px-4 py-3 text-txt/50 font-medium">Risk</th>
              <th class="text-left px-4 py-3 text-txt/50 font-medium">Sources</th>
              <th class="text-left px-4 py-3 text-txt/50 font-medium">Date</th>
              <th class="text-left px-4 py-3 text-txt/50 font-medium">Actions</th>
            </tr>
          </thead>
          <tbody id="scansTable" class="divide-y divide-border/20">
            <tr><td colspan="6" class="text-center py-12 text-txt/40">Loading scans...</td></tr>
          </tbody>
        </table>
      </div>
      <!-- Pagination -->
      <div class="flex items-center justify-between px-4 py-3 border-t border-border/20">
        <span id="paginationInfo" class="text-xs text-txt/40"></span>
        <div class="flex gap-2">
          <button id="btnPrev" class="px-3 py-1 rounded bg-border/20 text-xs disabled:opacity-30" disabled>← Prev</button>
          <button id="btnNext" class="px-3 py-1 rounded bg-border/20 text-xs disabled:opacity-30" disabled>Next →</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    const API = '/api/v1/auth';
    let token = localStorage.getItem('pg_token');
    let currentPage = 0;
    const PAGE_SIZE = 20;
    let trendChart, riskChart, dailyChart;

    if (!token) { window.location.href = '/login'; }

    const hdr = () => ({ 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' });

    async function loadCharts() {
      try {
        const r = await fetch(`${API}/scans/chart-data`, { headers: hdr() });
        if (!r.ok) { console.error('Chart data fetch failed:', r.status); return; }
        const data = await r.json();

        // Score Trend
        const trendCtx = document.getElementById('chartTrend').getContext('2d');
        trendChart = new Chart(trendCtx, {
          type: 'line',
          data: {
            labels: data.score_trend.map(d => new Date(d.date).toLocaleDateString()),
            datasets: [{
              label: 'Plagiarism Score',
              data: data.score_trend.map(d => d.score),
              borderColor: '#EF4444',
              backgroundColor: 'rgba(239,68,68,0.1)',
              fill: true, tension: 0.3, pointRadius: 3,
            }, {
              label: 'Confidence',
              data: data.score_trend.map(d => (d.confidence * 100).toFixed(1)),
              borderColor: '#3B82F6',
              backgroundColor: 'rgba(59,130,246,0.1)',
              fill: true, tension: 0.3, pointRadius: 3,
            }]
          },
          options: { responsive: true, plugins: { legend: { labels: { color: '#94A3B8' } } },
            scales: { x: { ticks: { color: '#64748B' } }, y: { ticks: { color: '#64748B' }, min: 0, max: 100 } } }
        });

        // Risk Distribution
        const riskCtx = document.getElementById('chartRisk').getContext('2d');
        riskChart = new Chart(riskCtx, {
          type: 'doughnut',
          data: {
            labels: ['Low', 'Medium', 'High'],
            datasets: [{ data: [data.risk_distribution.LOW, data.risk_distribution.MEDIUM, data.risk_distribution.HIGH],
              backgroundColor: ['#22C55E', '#EAB308', '#EF4444'], borderWidth: 0 }]
          },
          options: { responsive: true, plugins: { legend: { labels: { color: '#94A3B8' } } } }
        });

        // Daily Activity
        const dailyCtx = document.getElementById('chartDaily').getContext('2d');
        dailyChart = new Chart(dailyCtx, {
          type: 'bar',
          data: {
            labels: data.daily_counts.map(d => d.date),
            datasets: [{ label: 'Scans', data: data.daily_counts.map(d => d.count),
              backgroundColor: '#6366F1', borderRadius: 4 }]
          },
          options: { responsive: true, plugins: { legend: { display: false } },
            scales: { x: { ticks: { color: '#64748B' } }, y: { ticks: { color: '#64748B', stepSize: 1 } } } }
        });
      } catch (e) { console.error('Chart load error:', e); }
    }

    async function loadScans() {
      const search = document.getElementById('filterSearch').value;
      const risk = document.getElementById('filterRisk').value;
      const sortVal = document.getElementById('filterSort').value;
      const [sortBy, sortOrder] = sortVal.split('_').length === 3
        ? [sortVal.split('_').slice(0, 2).join('_'), sortVal.split('_')[2]]
        : [sortVal.replace('_desc','').replace('_asc',''), sortVal.endsWith('asc') ? 'asc' : 'desc'];

      const params = new URLSearchParams({ limit: PAGE_SIZE, offset: currentPage * PAGE_SIZE });
      if (search) params.set('search', search);
      if (risk) params.set('risk_level', risk);
      params.set('sort_by', sortBy);
      params.set('sort_order', sortOrder);

      const r = await fetch(`${API}/scans?${params}`, { headers: hdr() });
      const data = await r.json();
      const scans = data.scans || [];

      const tbody = document.getElementById('scansTable');
      if (!scans.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center py-12 text-txt/40">No scans found</td></tr>';
        document.getElementById('paginationInfo').textContent = '0 scans';
        document.getElementById('btnPrev').disabled = true;
        document.getElementById('btnNext').disabled = true;
        return;
      }

      tbody.innerHTML = scans.map(s => `
        <tr class="hover:bg-border/10 transition-colors cursor-pointer" onclick="viewScan('${encodeURIComponent(s.document_id)}')">
          <td class="px-4 py-3">
            <div class="font-medium">${esc(s.filename || s.document_id.slice(0,12)+'...')}</div>
            <div class="text-xs text-txt/40">${esc(s.document_id.slice(0,16))}...</div>
          </td>
          <td class="px-4 py-3">
            <div class="flex items-center gap-2">
              <div class="w-16 h-1.5 rounded-full bg-border/30 overflow-hidden">
                <div class="h-full rounded-full ${s.plagiarism_score > 60 ? 'bg-red-500' : s.plagiarism_score > 30 ? 'bg-yellow-500' : 'bg-green-500'}"
                     style="width: ${Math.min(s.plagiarism_score, 100)}%"></div>
              </div>
              <span class="text-sm font-mono">${s.plagiarism_score.toFixed(1)}%</span>
            </div>
          </td>
          <td class="px-4 py-3"><span class="risk-badge risk-${esc(s.risk_level)}">${esc(s.risk_level)}</span></td>
          <td class="px-4 py-3 text-txt/60">${s.sources_count || 0}</td>
          <td class="px-4 py-3 text-txt/50 text-xs">${new Date(s.created_at).toLocaleString()}</td>
          <td class="px-4 py-3">
            <button onclick="event.stopPropagation(); viewScan('${encodeURIComponent(s.document_id)}')" class="text-primary text-xs hover:underline">View</button>
          </td>
        </tr>
      `).join('');

      document.getElementById('paginationInfo').textContent = `Showing ${currentPage * PAGE_SIZE + 1}–${currentPage * PAGE_SIZE + scans.length}`;
      document.getElementById('btnPrev').disabled = currentPage === 0;
      document.getElementById('btnNext').disabled = scans.length < PAGE_SIZE;
    }

    function viewScan(docId) { window.location.href = `/app?scan=${docId}`; }

    document.getElementById('btnExportCSV').onclick = async () => {
      try {
        const r = await fetch(`${API}/scans/export-csv`, { headers: hdr() });
        if (!r.ok) { alert('CSV export failed. Please try again.'); return; }
        const blob = await r.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'plagiarismguard-scans.csv'; a.click();
        URL.revokeObjectURL(url);
      } catch (e) { alert('CSV export failed: ' + e.message); }
    };

    document.getElementById('btnPrev').onclick = () => { if (currentPage > 0) { currentPage--; loadScans(); } };
    document.getElementById('btnNext').onclick = () => { currentPage++; loadScans(); };
    document.getElementById('btnRefresh').onclick = () => { loadCharts(); loadScans(); };
    document.getElementById('filterSearch').oninput = () => { currentPage = 0; loadScans(); };
    document.getElementById('filterRisk').onchange = () => { currentPage = 0; loadScans(); };
    document.getElementById('filterSort').onchange = () => { currentPage = 0; loadScans(); };

    loadCharts();
    loadScans();
  </script>
</body>
</html>
