<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compare Scans — PlagiarismGuard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/static/js/common.js" defer></script>
  <script src="/static/js/auth.js" defer></script>
  <link rel="stylesheet" href="/static/css/theme.css" />
</head>
<body class="bg-bg text-txt min-h-screen">

  <nav class="fixed top-0 left-0 right-0 z-50 bg-bg/80 backdrop-blur-xl border-b border-border/50">
    <div class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 text-lg font-bold">
        <svg viewBox="0 0 40 40" class="w-7 h-7" xmlns="http://www.w3.org/2000/svg"><rect width="40" height="40" rx="8" fill="#4F46E5"/><rect x="10" y="7" width="18" height="24" rx="2" fill="white"/><path d="M22 7v6h6" fill="#E0E7FF"/><rect x="13" y="15" width="12" height="1.5" rx=".75" fill="#A5B4FC"/><rect x="13" y="19" width="10" height="1.5" rx=".75" fill="#A5B4FC"/><rect x="13" y="23" width="8" height="1.5" rx=".75" fill="#A5B4FC"/><circle cx="26" cy="27" r="7" fill="#22C55E"/><path d="M23 27l2 2 4-4" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        PlagiarismGuard
      </a>
      <div class="flex items-center gap-3">
        <a href="/history" class="text-sm text-txt/60 hover:text-primary">← Scan History</a>
        <a href="/app" class="text-sm text-txt/60 hover:text-primary">Dashboard</a>
        <button id="themeToggle" onclick="toggleTheme()" class="p-1.5 rounded-lg border border-border/30 hover:bg-surface2 transition-colors" title="Toggle theme">
          <svg class="w-4 h-4 theme-icon-moon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
          <svg class="w-4 h-4 theme-icon-sun hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <main class="max-w-5xl mx-auto pt-20 px-4 pb-12">
    <h1 class="text-2xl font-bold mb-6">Compare Scans</h1>

    <!-- Scan selector -->
    <div class="grid grid-cols-2 gap-4 mb-6">
      <div>
        <label class="text-sm text-txt/60 mb-1 block">Version A (older)</label>
        <select id="selectA" class="w-full bg-surface border border-border/30 rounded-lg px-3 py-2 text-sm glow-input">
          <option value="">Loading scans...</option>
        </select>
      </div>
      <div>
        <label class="text-sm text-txt/60 mb-1 block">Version B (newer)</label>
        <select id="selectB" class="w-full bg-surface border border-border/30 rounded-lg px-3 py-2 text-sm glow-input">
          <option value="">Loading scans...</option>
        </select>
      </div>
    </div>

    <button id="btnCompare" class="px-6 py-2.5 rounded-xl bg-primary text-white font-medium hover:bg-primary/80 transition-all mb-8 pulse-btn">
      Compare
    </button>

    <!-- Results -->
    <div id="compareResults" class="hidden space-y-6">
      <!-- Score diff cards -->
      <div class="grid grid-cols-5 gap-3" id="scoreDiffCards"></div>

      <!-- Source changes -->
      <div class="grid grid-cols-2 gap-4">
        <div>
          <h3 class="text-sm font-bold mb-2 text-red-400">🔴 New Sources (in B, not in A)</h3>
          <div id="newSources" class="space-y-2"></div>
        </div>
        <div>
          <h3 class="text-sm font-bold mb-2 text-green-400">🟢 Removed Sources (in A, not in B)</h3>
          <div id="removedSources" class="space-y-2"></div>
        </div>
      </div>

      <!-- Common sources with similarity change -->
      <div>
        <h3 class="text-sm font-bold mb-2 text-txt/60">Common Sources — Similarity Change</h3>
        <div id="commonSources" class="space-y-2"></div>
      </div>

      <!-- Passage changes -->
      <div class="grid grid-cols-2 gap-4">
        <div>
          <h3 class="text-sm font-bold mb-2 text-red-400">New Flagged Passages</h3>
          <div id="newPassages" class="space-y-2 text-xs"></div>
        </div>
        <div>
          <h3 class="text-sm font-bold mb-2 text-green-400">Resolved Passages ✅</h3>
          <div id="resolvedPassages" class="space-y-2 text-xs"></div>
        </div>
      </div>
    </div>

    <div id="compareError" class="hidden text-red-400 text-sm mt-4"></div>
  </main>

  <script>
    const token = localStorage.getItem('pg_token');
    if (!token) window.location.href = '/login';
    const hdr = () => ({ 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' });

    // Load user's scans into selectors
    async function loadScans() {
      const r = await fetch('/api/v1/auth/scans?limit=100', { headers: hdr() });
      if (!r.ok) return;
      const data = await r.json();
      const scans = data.scans || [];
      const optionsHtml = scans.map(s => {
        const date = s.created_at ? new Date(s.created_at).toLocaleDateString() : '';
        const score = (s.plagiarism_score || 0).toFixed(1);
        return `<option value="${esc(s.document_id)}">${esc(s.document_id.slice(0, 8))}… — ${score}% — ${date}</option>`;
      }).join('');
      document.getElementById('selectA').innerHTML = '<option value="">Select scan A…</option>' + optionsHtml;
      document.getElementById('selectB').innerHTML = '<option value="">Select scan B…</option>' + optionsHtml;

      // Pre-select from URL params
      const p = new URLSearchParams(window.location.search);
      if (p.get('a')) document.getElementById('selectA').value = p.get('a');
      if (p.get('b')) document.getElementById('selectB').value = p.get('b');
    }

    document.getElementById('btnCompare').onclick = async () => {
      const a = document.getElementById('selectA').value;
      const b = document.getElementById('selectB').value;
      if (!a || !b) { showToast('Select both scans', 'warning'); return; }
      if (a === b) { showToast('Select two different scans', 'warning'); return; }

      document.getElementById('btnCompare').disabled = true;
      document.getElementById('btnCompare').textContent = 'Comparing...';
      document.getElementById('compareError').classList.add('hidden');

      try {
        const r = await fetch('/api/v1/compare-scans', {
          method: 'POST', headers: hdr(),
          body: JSON.stringify({ document_id_a: a, document_id_b: b }),
        });
        if (!r.ok) { const e = await r.json(); throw new Error(e.detail || 'Comparison failed'); }
        const data = await r.json();
        renderComparison(data);
      } catch (e) {
        document.getElementById('compareError').textContent = e.message;
        document.getElementById('compareError').classList.remove('hidden');
      } finally {
        document.getElementById('btnCompare').disabled = false;
        document.getElementById('btnCompare').textContent = 'Compare';
      }
    };

    function renderComparison(data) {
      document.getElementById('compareResults').classList.remove('hidden');
      const sd = data.score_diff;

      // Score diff cards
      const metrics = [
        { label: 'Plagiarism', a: sd.plagiarism_score.a, b: sd.plagiarism_score.b, change: sd.plagiarism_score.change, suffix: '%', invert: true },
        { label: 'Confidence', a: (sd.confidence_score.a * 100).toFixed(0), b: (sd.confidence_score.b * 100).toFixed(0), change: (sd.confidence_score.change * 100).toFixed(0), suffix: '%' },
        { label: 'Risk', a: sd.risk_level.a, b: sd.risk_level.b, isText: true },
        { label: 'Sources', a: sd.sources_count.a, b: sd.sources_count.b, change: sd.sources_count.change, invert: true },
        { label: 'Flagged', a: sd.flagged_count.a, b: sd.flagged_count.b, change: sd.flagged_count.change, invert: true },
      ];

      document.getElementById('scoreDiffCards').innerHTML = metrics.map(m => {
        let changeHtml = '';
        if (m.isText) {
          changeHtml = `<div class="text-lg font-bold">${esc(String(m.a))} → ${esc(String(m.b))}</div>`;
        } else {
          const ch = parseFloat(m.change);
          const isGood = m.invert ? ch < 0 : ch > 0;
          const color = ch === 0 ? 'text-txt/40' : isGood ? 'text-green-400' : 'text-red-400';
          const arrow = ch > 0 ? '↑' : ch < 0 ? '↓' : '–';
          changeHtml = `
            <div class="text-lg font-bold">${m.a}${m.suffix || ''} → ${m.b}${m.suffix || ''}</div>
            <div class="text-xs ${color} font-mono">${arrow} ${Math.abs(ch)}${m.suffix || ''}</div>`;
        }
        return `<div class="stat-card"><div class="text-xs text-txt/50 mb-1">${m.label}</div>${changeHtml}</div>`;
      }).join('');

      // Sources
      const renderSourceList = (sources, el) => {
        el.innerHTML = sources.length
          ? sources.map(s => `<div class="bg-surface2/50 rounded p-2 text-xs"><span class="font-bold">${esc(s.title || 'Unknown')}</span> <span class="text-txt/40">${((s.similarity || 0) * 100).toFixed(0)}%</span><br><span class="text-txt/40 truncate block">${esc(s.url || '')}</span></div>`).join('')
          : '<p class="text-txt/30 text-xs">None</p>';
      };
      renderSourceList(data.new_sources, document.getElementById('newSources'));
      renderSourceList(data.removed_sources, document.getElementById('removedSources'));

      // Common sources
      const csEl = document.getElementById('commonSources');
      csEl.innerHTML = data.common_sources.length
        ? data.common_sources.map(s => {
            const ch = ((s.similarity_b - s.similarity_a) * 100).toFixed(0);
            const color = ch > 0 ? 'text-red-400' : ch < 0 ? 'text-green-400' : 'text-txt/40';
            return `<div class="bg-surface2/50 rounded p-2 text-xs flex justify-between items-center">
              <span class="truncate flex-1">${esc(s.title || s.url || 'Unknown')}</span>
              <span class="ml-2 font-mono">${(s.similarity_a * 100).toFixed(0)}% → ${(s.similarity_b * 100).toFixed(0)}%</span>
              <span class="ml-2 ${color} font-mono">${ch > 0 ? '+' : ''}${ch}%</span>
            </div>`;
          }).join('')
        : '<p class="text-txt/30 text-xs">No common sources</p>';

      // Passages
      const renderPassages = (passages, el) => {
        el.innerHTML = passages.length
          ? passages.map(p => `<div class="bg-surface2/50 rounded p-2 text-txt/70 italic">"${esc(p.text || '')}"</div>`).join('')
          : '<p class="text-txt/30">None</p>';
      };
      renderPassages(data.new_passages, document.getElementById('newPassages'));
      renderPassages(data.resolved_passages, document.getElementById('resolvedPassages'));
    }

    loadScans();
  </script>
<footer class="py-4 text-center text-[11px] text-muted/60">Built by <a href="https://www.linkedin.com/in/sumitmalik51/" target="_blank" class="hover:text-accent transition-colors">Sumit Malik</a></footer>
</body>
</html>
