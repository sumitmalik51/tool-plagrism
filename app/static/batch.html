<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Batch Upload — PlagiarismGuard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/static/js/common.js" defer></script>
  <script src="/static/js/auth.js" defer></script>
  <link rel="stylesheet" href="/static/css/theme.css" />
</head>
<body class="bg-bg text-txt min-h-screen">

  <nav class="fixed top-0 left-0 right-0 z-50 bg-bg/80 backdrop-blur-xl border-b border-border/50">
    <div class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 text-lg font-bold">
        <svg viewBox="0 0 40 40" class="w-7 h-7" xmlns="http://www.w3.org/2000/svg"><rect width="40" height="40" rx="8" fill="#4F46E5"/><rect x="10" y="7" width="18" height="24" rx="2" fill="white"/><path d="M22 7v6h6" fill="#E0E7FF"/><rect x="13" y="15" width="12" height="1.5" rx=".75" fill="#A5B4FC"/><rect x="13" y="19" width="10" height="1.5" rx=".75" fill="#A5B4FC"/><rect x="13" y="23" width="8" height="1.5" rx=".75" fill="#A5B4FC"/><circle cx="26" cy="27" r="7" fill="#22C55E"/><path d="M23 27l2 2 4-4" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        PlagiarismGuard
      </a>
      <div class="flex items-center gap-3">
        <a href="/app" class="text-sm text-txt/60 hover:text-primary">Dashboard</a>
        <a href="/history" class="text-sm text-txt/60 hover:text-primary">History</a>
        <button id="themeToggle" onclick="toggleTheme()" class="p-1.5 rounded-lg border border-border/30 hover:bg-surface2 transition-colors" title="Toggle theme">
          <svg class="w-4 h-4 theme-icon-moon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
          <svg class="w-4 h-4 theme-icon-sun hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <main class="max-w-5xl mx-auto px-4 pt-20 pb-12">
    <div class="mb-8">
      <h1 class="text-2xl font-bold">Batch Upload</h1>
      <p class="text-txt/50 text-sm mt-1">Analyze multiple files at once. Requires Pro or Premium plan.</p>
    </div>

    <!-- Drop Zone -->
    <div id="dropZone" class="border-2 border-dashed border-border/40 rounded-2xl p-12 text-center hover:border-primary/50 transition-colors cursor-pointer mb-6">
      <svg class="w-12 h-12 mx-auto mb-4 text-txt/30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
      </svg>
      <p class="text-txt/50 mb-2">Drag & drop files here, or click to browse</p>
      <p class="text-xs text-txt/30">Supports PDF, DOCX, TXT, TEX, PPTX — Max 10 files</p>
      <input id="fileInput" type="file" multiple accept=".pdf,.docx,.txt,.tex,.pptx" class="hidden" />
    </div>

    <!-- File List -->
    <div id="fileList" class="space-y-2 mb-6 hidden"></div>

    <!-- Actions -->
    <div class="flex items-center gap-3 mb-8">
      <button id="btnAnalyze" class="px-6 py-2.5 rounded-xl bg-primary text-white font-medium hover:bg-primary/80 disabled:opacity-40" disabled>
        Analyze All Files
      </button>
      <button id="btnClear" class="px-4 py-2.5 rounded-xl bg-border/20 text-sm hover:bg-border/40 hidden">
        Clear All
      </button>
      <div id="progressInfo" class="text-sm text-txt/50 hidden">
        <span id="progressText">0 / 0 completed</span>
      </div>
    </div>

    <!-- Results -->
    <div id="resultsSection" class="hidden">
      <h2 class="text-lg font-bold mb-4">Results</h2>
      <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>
  </main>

  <script>
    const token = localStorage.getItem('pg_token');
    if (!token) window.location.href = '/login';
    const hdr = () => ({ 'Authorization': `Bearer ${token}` });

    let selectedFiles = [];

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const btnAnalyze = document.getElementById('btnAnalyze');
    const btnClear = document.getElementById('btnClear');

    dropZone.onclick = () => fileInput.click();
    dropZone.ondragover = e => { e.preventDefault(); dropZone.classList.add('border-primary'); };
    dropZone.ondragleave = () => dropZone.classList.remove('border-primary');
    dropZone.ondrop = e => { e.preventDefault(); dropZone.classList.remove('border-primary'); addFiles(e.dataTransfer.files); };
    fileInput.onchange = e => addFiles(e.target.files);

    function addFiles(files) {
      for (const f of files) {
        if (selectedFiles.length >= 10) break;
        if (!selectedFiles.find(s => s.name === f.name)) selectedFiles.push(f);
      }
      renderFiles();
    }

    function renderFiles() {
      if (!selectedFiles.length) {
        fileList.classList.add('hidden');
        btnAnalyze.disabled = true;
        btnClear.classList.add('hidden');
        return;
      }
      fileList.classList.remove('hidden');
      btnAnalyze.disabled = false;
      btnClear.classList.remove('hidden');

      fileList.innerHTML = selectedFiles.map((f, i) => `
        <div class="flex items-center justify-between bg-card border border-border/20 rounded-lg px-4 py-2">
          <div class="flex items-center gap-3">
            <span class="text-lg">${f.name.endsWith('.pdf') ? '📄' : f.name.endsWith('.docx') ? '📝' : f.name.endsWith('.pptx') ? '📊' : '📃'}</span>
            <div>
              <div class="text-sm font-medium">${esc(f.name)}</div>
              <div class="text-xs text-txt/40">${(f.size / 1024).toFixed(1)} KB</div>
            </div>
          </div>
          <button onclick="removeFile(${i})" class="text-red-400 hover:text-red-300 text-sm">✕</button>
        </div>
      `).join('');
    }

    function removeFile(i) { selectedFiles.splice(i, 1); renderFiles(); }
    btnClear.onclick = () => { selectedFiles = []; renderFiles(); };

    btnAnalyze.onclick = async () => {
      btnAnalyze.disabled = true;
      btnAnalyze.textContent = 'Analyzing...';
      document.getElementById('progressInfo').classList.remove('hidden');
      document.getElementById('resultsSection').classList.remove('hidden');
      const resultsGrid = document.getElementById('resultsGrid');
      resultsGrid.innerHTML = '';

      const formData = new FormData();
      selectedFiles.forEach(f => formData.append('files', f));
      formData.append('use_gpt_ai_detection', 'false');

      try {
        const resp = await fetch('/api/v1/analyze-batch', {
          method: 'POST',
          headers: hdr(),
          body: formData,
        });
        const data = await resp.json();

        if (!resp.ok) {
          resultsGrid.innerHTML = `<div class="col-span-2 bg-red-500/10 border border-red-500/30 rounded-xl p-4 text-red-400">${esc(data.detail || 'Batch analysis failed')}</div>`;
          return;
        }

        const results = data.results || [];
        document.getElementById('progressText').textContent = `${results.length} / ${selectedFiles.length} completed`;

        results.forEach(r => {
          const isError = !!r.error;
          resultsGrid.innerHTML += `
            <div class="bg-card border border-border/30 rounded-xl p-4 ${isError ? 'border-red-500/30' : ''}">
              <div class="flex items-center justify-between mb-3">
                <h4 class="font-medium text-sm truncate">${esc(r.filename || 'Unknown')}</h4>
                ${isError ? '<span class="text-xs text-red-400">Error</span>' :
                  `<span class="px-2 py-0.5 rounded-full text-xs font-bold ${
                    r.risk_level === 'HIGH' ? 'bg-red-500/20 text-red-400' :
                    r.risk_level === 'MEDIUM' ? 'bg-yellow-500/20 text-yellow-400' :
                    'bg-green-500/20 text-green-400'}">${r.risk_level}</span>`}
              </div>
              ${isError ? `<p class="text-sm text-red-300">${esc(r.error)}</p>` : `
                <div class="flex items-center gap-4 text-sm text-txt/60">
                  <div>Score: <span class="font-bold text-txt">${r.plagiarism_score?.toFixed(1)}%</span></div>
                  <div>Sources: <span class="font-bold text-txt">${r.sources_count || 0}</span></div>
                </div>
                <div class="mt-2 w-full h-1.5 rounded-full bg-border/20 overflow-hidden">
                  <div class="h-full rounded-full ${r.plagiarism_score > 60 ? 'bg-red-500' : r.plagiarism_score > 30 ? 'bg-yellow-500' : 'bg-green-500'}"
                       style="width: ${Math.min(r.plagiarism_score || 0, 100)}%"></div>
                </div>
                ${r.document_id ? `<a href="/app?scan=${r.document_id}" class="text-primary text-xs mt-2 inline-block hover:underline">View Full Report →</a>` : ''}
              `}
            </div>
          `;
        });
      } catch (e) {
        resultsGrid.innerHTML = `<div class="col-span-2 text-red-400">Error: ${esc(e.message)}</div>`;
      } finally {
        btnAnalyze.disabled = false;
        btnAnalyze.textContent = 'Analyze All Files';
      }
    };
  </script>
</body>
</html>
