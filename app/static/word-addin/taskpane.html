<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlagiarismGuard</title>
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; font-size: 13px; padding: 16px; }
    h1 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { font-size: 11px; color: #64748b; margin-bottom: 16px; }
    .btn { width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-bottom: 8px; }
    .btn-primary { background: #4f46e5; color: white; }
    .btn-primary:hover { background: #4338ca; }
    .btn-secondary { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
    .btn-secondary:hover { background: #334155; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .input { width: 100%; padding: 8px 12px; border: 1px solid #334155; border-radius: 8px; background: #1e293b; color: #e2e8f0; font-size: 12px; margin-bottom: 8px; }
    .section { margin-bottom: 16px; }
    .label { font-size: 11px; color: #64748b; margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .result-card { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 12px; margin-bottom: 8px; }
    .score { font-size: 28px; font-weight: 800; }
    .score.low { color: #22c55e; }
    .score.medium { color: #eab308; }
    .score.high { color: #ef4444; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
    .badge-low { background: rgba(34,197,94,0.2); color: #22c55e; }
    .badge-medium { background: rgba(234,179,8,0.2); color: #eab308; }
    .badge-high { background: rgba(239,68,68,0.2); color: #ef4444; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #334155; border-top: 2px solid #4f46e5; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }
    .passage { background: #0f172a; border-radius: 6px; padding: 8px; margin: 4px 0; font-size: 11px; line-height: 1.5; border-left: 3px solid #ef4444; }
    .passage-source { font-size: 10px; color: #6366f1; margin-top: 4px; word-break: break-all; }
    .tab-bar { display: flex; gap: 4px; margin-bottom: 12px; }
    .tab { flex: 1; padding: 6px; text-align: center; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 600; background: #1e293b; color: #64748b; }
    .tab.active { background: #4f46e5; color: white; }
    .settings-link { font-size: 11px; color: #6366f1; cursor: pointer; text-align: center; display: block; margin-top: 8px; }
  </style>
</head>
<body>
  <!-- Header -->
  <h1>PlagiarismGuard</h1>
  <p class="subtitle">Plagiarism & AI Detection for Word</p>

  <!-- Settings (collapsed) -->
  <div id="settingsSection" class="section hidden">
    <div class="label">Server URL</div>
    <input id="serverUrl" type="url" class="input" placeholder="https://plagiarismguard-jl6yu5wij5mu4.azurewebsites.net" />
    <div class="label">API Token</div>
    <input id="apiToken" type="password" class="input" placeholder="Your JWT token or API key" />
    <button class="btn btn-primary" onclick="saveSettings()">Save Settings</button>
  </div>

  <!-- Tabs -->
  <div class="tab-bar">
    <div class="tab active" data-tab="scan" onclick="switchTab('scan')">Scan</div>
    <div class="tab" data-tab="ai" onclick="switchTab('ai')">AI Detect</div>
    <div class="tab" data-tab="rewrite" onclick="switchTab('rewrite')">Rewrite</div>
  </div>

  <!-- Scan Tab -->
  <div id="tab-scan">
    <button class="btn btn-primary" onclick="scanSelected()" id="btnScanSelected">
      ✓ Scan Selected Text
    </button>
    <button class="btn btn-secondary" onclick="scanFullDoc()" id="btnScanFull">
      📄 Scan Full Document
    </button>
  </div>

  <!-- AI Detection Tab -->
  <div id="tab-ai" class="hidden">
    <button class="btn btn-primary" onclick="detectAI()" id="btnAI">
      🤖 Detect AI Content
    </button>
    <p style="font-size: 11px; color: #64748b; margin-top: 4px;">Detects ChatGPT, Claude, Gemini, Copilot</p>
  </div>

  <!-- Rewrite Tab -->
  <div id="tab-rewrite" class="hidden">
    <button class="btn btn-primary" onclick="rewriteSelected()" id="btnRewrite">
      ✍ Humanize Selected Text
    </button>
    <button class="btn btn-secondary" onclick="replaceWithRewrite()">
      ↩ Replace in Document
    </button>
  </div>

  <!-- Loading -->
  <div id="loading" class="hidden" style="text-align: center; padding: 20px;">
    <div class="spinner"></div>
    <p style="margin-top: 8px; color: #64748b; font-size: 11px;">Analyzing...</p>
  </div>

  <!-- Results -->
  <div id="results" class="hidden" style="margin-top: 12px;">
    <div id="scanResult"></div>
  </div>

  <a class="settings-link" onclick="toggleSettings()">⚙ Settings</a>

  <script>
    let lastRewriteText = '';

    Office.onReady(info => {
      if (info.host !== Office.HostType.Word) {
        document.body.innerHTML = '<p style="color:#ef4444;padding:20px">This add-in only works in Microsoft Word.</p>';
      }
      // Load saved settings
      const saved = localStorage.getItem('pg_word_settings');
      if (saved) {
        const s = JSON.parse(saved);
        document.getElementById('serverUrl').value = s.url || '';
        document.getElementById('apiToken').value = s.token || '';
      }
    });

    function getConfig() {
      const saved = localStorage.getItem('pg_word_settings');
      if (saved) {
        const s = JSON.parse(saved);
        return { url: s.url || 'https://plagiarismguard-jl6yu5wij5mu4.azurewebsites.net', token: s.token || '' };
      }
      return { url: 'https://plagiarismguard-jl6yu5wij5mu4.azurewebsites.net', token: '' };
    }

    function saveSettings() {
      const url = document.getElementById('serverUrl').value.replace(/\/$/, '');
      const token = document.getElementById('apiToken').value;
      localStorage.setItem('pg_word_settings', JSON.stringify({ url, token }));
      document.getElementById('settingsSection').classList.add('hidden');
      alert('Settings saved!');
    }

    function toggleSettings() {
      document.getElementById('settingsSection').classList.toggle('hidden');
    }

    function switchTab(name) {
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
      ['scan', 'ai', 'rewrite'].forEach(t => {
        document.getElementById('tab-' + t).classList.toggle('hidden', t !== name);
      });
    }

    function showLoading(show) {
      document.getElementById('loading').classList.toggle('hidden', !show);
      document.getElementById('results').classList.add('hidden');
    }

    async function getSelectedText() {
      return new Promise((resolve, reject) => {
        Office.context.document.getSelectedDataAsync(Office.CoercionType.Text, result => {
          if (result.status === Office.AsyncResultStatus.Succeeded) resolve(result.value);
          else reject(new Error('Failed to get selected text'));
        });
      });
    }

    async function getFullDocText() {
      return Word.run(async context => {
        const body = context.document.body;
        body.load('text');
        await context.sync();
        return body.text;
      });
    }

    async function callApi(endpoint, body) {
      const config = getConfig();
      const resp = await fetch(`${config.url}${endpoint}`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${config.token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err.detail || `HTTP ${resp.status}`);
      }
      return resp.json();
    }

    async function scanSelected() {
      try {
        showLoading(true);
        const text = await getSelectedText();
        if (!text || text.trim().length < 20) { alert('Please select at least 20 characters.'); showLoading(false); return; }
        const data = await callApi('/api/v1/analyze-agent', { text, use_gpt_ai_detection: false });
        showScanResult(data);
      } catch (e) { alert('Error: ' + e.message); } finally { showLoading(false); }
    }

    async function scanFullDoc() {
      try {
        showLoading(true);
        const text = await getFullDocText();
        if (!text || text.trim().length < 20) { alert('Document is too short.'); showLoading(false); return; }
        const data = await callApi('/api/v1/analyze-agent', { text: text.slice(0, 50000), use_gpt_ai_detection: false });
        showScanResult(data);
      } catch (e) { alert('Error: ' + e.message); } finally { showLoading(false); }
    }

    async function detectAI() {
      try {
        showLoading(true);
        let text;
        try { text = await getSelectedText(); } catch { text = ''; }
        if (!text || text.trim().length < 20) text = await getFullDocText();
        const data = await callApi('/tools/ai-detect', { text: text.slice(0, 30000), use_gpt: true });
        showAIResult(data);
      } catch (e) { alert('Error: ' + e.message); } finally { showLoading(false); }
    }

    async function rewriteSelected() {
      try {
        showLoading(true);
        const text = await getSelectedText();
        if (!text || text.trim().length < 10) { alert('Select text to rewrite.'); showLoading(false); return; }
        const data = await callApi('/api/v1/rewrite/paragraph', { text, style: 'academic', tone: 'formal' });
        lastRewriteText = data.rewritten_text || data.text || '';
        showRewriteResult(data);
      } catch (e) { alert('Error: ' + e.message); } finally { showLoading(false); }
    }

    async function replaceWithRewrite() {
      if (!lastRewriteText) { alert('Rewrite text first.'); return; }
      await Word.run(async context => {
        const selection = context.document.getSelection();
        selection.insertText(lastRewriteText, Word.InsertLocation.replace);
        await context.sync();
      });
    }

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

    function showScanResult(data) {
      const score = data.plagiarism_score || 0;
      const risk = data.risk_level || 'LOW';
      const cls = risk === 'HIGH' ? 'high' : risk === 'MEDIUM' ? 'medium' : 'low';
      const badgeCls = 'badge-' + cls;
      const passages = (data.flagged_passages || []).slice(0, 5);

      let html = `
        <div class="result-card">
          <div class="score ${cls}">${score.toFixed(1)}%</div>
          <div style="margin: 4px 0"><span class="badge ${badgeCls}">${risk} RISK</span></div>
          <div style="font-size: 11px; color: #94a3b8; margin-top: 4px">
            Confidence: ${((data.confidence_score || 0) * 100).toFixed(0)}% · Sources: ${(data.detected_sources || []).length}
          </div>
        </div>
      `;
      if (passages.length) {
        html += '<div class="label" style="margin-top: 8px">Flagged Passages</div>';
        passages.forEach(p => {
          html += `<div class="passage">"${esc((p.text || '').slice(0, 150))}..."${p.source ? `<div class="passage-source">${esc(p.source)}</div>` : ''}</div>`;
        });
      }
      document.getElementById('scanResult').innerHTML = html;
      document.getElementById('results').classList.remove('hidden');
    }

    function showAIResult(data) {
      const prob = data.ai_probability || 0;
      const isAi = data.is_ai_generated || false;
      const cls = prob > 0.7 ? 'high' : prob > 0.3 ? 'medium' : 'low';
      const models = data.model_attribution || {};

      let html = `
        <div class="result-card">
          <div class="score ${cls}">${(prob * 100).toFixed(0)}%</div>
          <div style="font-size: 12px; color: ${isAi ? '#ef4444' : '#22c55e'}; margin: 4px 0; font-weight: 600">
            ${isAi ? '⚠ Likely AI-Generated' : '✓ Likely Human-Written'}
          </div>
        </div>
      `;
      if (Object.keys(models).length) {
        html += '<div class="label" style="margin-top: 8px">Model Attribution</div><div class="result-card">';
        Object.entries(models).sort((a,b) => b[1] - a[1]).forEach(([model, score]) => {
          html += `<div style="display:flex;justify-content:space-between;margin:3px 0"><span>${esc(model)}</span><span style="color:#6366f1">${(score * 100).toFixed(0)}%</span></div>`;
        });
        html += '</div>';
      }
      document.getElementById('scanResult').innerHTML = html;
      document.getElementById('results').classList.remove('hidden');
    }

    function showRewriteResult(data) {
      const text = data.rewritten_text || data.text || 'No rewrite available';
      document.getElementById('scanResult').innerHTML = `
        <div class="result-card">
          <div class="label">Rewritten Text</div>
          <div style="font-size: 12px; line-height: 1.6; margin-top: 6px">${text}</div>
        </div>
      `;
      document.getElementById('results').classList.remove('hidden');
    }
  </script>
</body>
</html>
