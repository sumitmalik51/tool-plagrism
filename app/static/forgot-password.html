<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <title>Reset Password — PlagiarismGuard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg:       '#0f1117',
            surface:  '#1a1d27',
            surface2: '#242836',
            border:   '#2e3348',
            txt:      '#e1e4ed',
            muted:    '#8b8fa3',
            accent:   '#6c5ce7',
            'accent-l':'#a29bfe',
            ok:       '#00b894',
            warn:     '#fdcb6e',
            danger:   '#e17055',
          }
        }
      }
    }
  </script>
  <style>
    @keyframes float1 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(30px,-40px) scale(1.1); } }
    @keyframes float2 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-20px,30px) scale(1.15); } }
    @keyframes float3 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(15px,25px) scale(1.05); } }
    .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: .18; pointer-events: none; }
    .orb-1 { width: 500px; height: 500px; background: #6c5ce7; top: -120px; left: -80px; animation: float1 8s ease-in-out infinite; }
    .orb-2 { width: 400px; height: 400px; background: #00b894; bottom: -100px; right: -60px; animation: float2 10s ease-in-out infinite; }
    .orb-3 { width: 300px; height: 300px; background: #e17055; top: 50%; left: 50%; transform: translate(-50%,-50%); animation: float3 12s ease-in-out infinite; }
    .glow-input:focus { border-color: #6c5ce7; box-shadow: 0 0 0 3px rgba(108,92,231,.15); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up { animation: fadeUp .6s ease-out both; }
    .fade-up-d1 { animation-delay: .1s; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin .8s linear infinite; }
  </style>
</head>
<body class="bg-bg text-txt min-h-screen flex items-center justify-center relative overflow-hidden">

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="relative z-10 w-full max-w-md px-6">
    <!-- Logo -->
    <div class="flex items-center justify-center gap-3 mb-8 fade-up">
      <div class="w-10 h-10 bg-gradient-to-br from-accent to-[#00b894] rounded-xl grid place-items-center shadow-lg shadow-accent/20"><svg viewBox="0 0 64 64" class="w-7 h-7" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="14" y="8" width="30" height="38" rx="3" fill="white" opacity=".95"/><path d="M36 8L46 18H36Z" fill="#c7d2fe"/><rect x="19" y="22" width="18" height="2.5" rx="1" fill="#6366f1" opacity=".5"/><rect x="19" y="28" width="14" height="2.5" rx="1" fill="#6366f1" opacity=".5"/><rect x="19" y="34" width="16" height="2.5" rx="1" fill="#6366f1" opacity=".5"/><path d="M44 36l8 3.5V46c0 4.5-4 7.5-8 9-4-1.5-8-4.5-8-9v-6.5Z" fill="#22c55e"/><polyline points="40,43 43,46 48,41" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <span class="text-xl font-bold">PlagiarismGuard</span>
    </div>

    <div class="bg-surface/80 backdrop-blur-xl border border-border rounded-2xl p-8 shadow-2xl fade-up fade-up-d1">

      <!-- Step 1: Request reset -->
      <div id="stepRequest">
        <h1 class="text-2xl font-bold text-center mb-1">Forgot your password?</h1>
        <p class="text-sm text-muted text-center mb-6">Enter your email and we'll send you a reset link.</p>

        <div id="errorMsg" class="hidden mb-4 p-3 rounded-lg bg-danger/15 border border-danger/30 text-danger text-sm"></div>
        <div id="successMsg" class="hidden mb-4 p-3 rounded-lg bg-ok/15 border border-ok/30 text-ok text-sm"></div>

        <form id="requestForm" onsubmit="handleRequest(event)" class="space-y-4">
          <div>
            <label for="email" class="block text-sm font-medium text-muted mb-1.5">Email Address</label>
            <input id="email" type="email" required autocomplete="email"
              class="w-full px-4 py-2.5 bg-surface2 border border-border rounded-xl text-txt placeholder-muted/60 outline-none glow-input transition-all"
              placeholder="jane@example.com" />
          </div>
          <button id="requestBtn" type="submit"
            class="w-full py-3 bg-gradient-to-r from-accent to-[#5a4bd1] text-white rounded-xl font-semibold text-[15px] hover:shadow-lg hover:shadow-accent/25 hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
            <span id="requestBtnText">Send Reset Link</span>
            <svg id="requestBtnSpinner" class="hidden spinner" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10" stroke-dasharray="32" stroke-dashoffset="32" stroke-linecap="round"/></svg>
          </button>
        </form>
      </div>

      <!-- Step 2: Reset password (shown when ?token= is present) -->
      <div id="stepReset" class="hidden">
        <h1 class="text-2xl font-bold text-center mb-1">Set new password</h1>
        <p class="text-sm text-muted text-center mb-6">Enter your new password below.</p>

        <div id="resetErrorMsg" class="hidden mb-4 p-3 rounded-lg bg-danger/15 border border-danger/30 text-danger text-sm"></div>
        <div id="resetSuccessMsg" class="hidden mb-4 p-3 rounded-lg bg-ok/15 border border-ok/30 text-ok text-sm"></div>

        <form id="resetForm" onsubmit="handleReset(event)" class="space-y-4">
          <div>
            <label for="newPassword" class="block text-sm font-medium text-muted mb-1.5">New Password</label>
            <input id="newPassword" type="password" required minlength="8" autocomplete="new-password"
              class="w-full px-4 py-2.5 bg-surface2 border border-border rounded-xl text-txt placeholder-muted/60 outline-none glow-input transition-all"
              placeholder="At least 8 characters" />
          </div>
          <div>
            <label for="confirmPassword" class="block text-sm font-medium text-muted mb-1.5">Confirm Password</label>
            <input id="confirmPassword" type="password" required minlength="8" autocomplete="new-password"
              class="w-full px-4 py-2.5 bg-surface2 border border-border rounded-xl text-txt placeholder-muted/60 outline-none glow-input transition-all"
              placeholder="Re-enter your password" />
          </div>
          <button id="resetBtn" type="submit"
            class="w-full py-3 bg-gradient-to-r from-accent to-[#5a4bd1] text-white rounded-xl font-semibold text-[15px] hover:shadow-lg hover:shadow-accent/25 hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
            <span id="resetBtnText">Reset Password</span>
            <svg id="resetBtnSpinner" class="hidden spinner" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10" stroke-dasharray="32" stroke-dashoffset="32" stroke-linecap="round"/></svg>
          </button>
        </form>
      </div>

      <p class="text-sm text-muted text-center mt-6">
        <a href="/login" class="text-accent-l hover:text-accent font-medium transition-colors">← Back to Sign In</a>
      </p>
    </div>
  </div>

  <script>
    function $(id) { return document.getElementById(id); }

    const params = new URLSearchParams(window.location.search);
    const resetToken = params.get('token');

    // If token is in URL, show reset form
    if (resetToken) {
      $('stepRequest').classList.add('hidden');
      $('stepReset').classList.remove('hidden');
    }

    async function handleRequest(e) {
      e.preventDefault();
      $('errorMsg').classList.add('hidden');
      $('successMsg').classList.add('hidden');

      const email = $('email').value.trim();
      $('requestBtn').disabled = true;
      $('requestBtnText').textContent = 'Sending…';
      $('requestBtnSpinner').classList.remove('hidden');

      try {
        const res = await fetch('/api/v1/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const data = await res.json();

        if (!res.ok) {
          $('errorMsg').textContent = data.detail || 'Something went wrong.';
          $('errorMsg').classList.remove('hidden');
          return;
        }

        // If a token was returned (dev mode), show the reset link
        if (data.token) {
          const resetUrl = window.location.origin + '/forgot-password?token=' + encodeURIComponent(data.token);
          $('successMsg').innerHTML = 'Reset link generated! <a href="' + resetUrl + '" class="underline font-semibold">Click here to reset your password</a>';
        } else {
          $('successMsg').textContent = data.message;
        }
        $('successMsg').classList.remove('hidden');
      } catch (err) {
        $('errorMsg').textContent = 'Network error — please try again.';
        $('errorMsg').classList.remove('hidden');
      } finally {
        $('requestBtn').disabled = false;
        $('requestBtnText').textContent = 'Send Reset Link';
        $('requestBtnSpinner').classList.add('hidden');
      }
    }

    async function handleReset(e) {
      e.preventDefault();
      $('resetErrorMsg').classList.add('hidden');
      $('resetSuccessMsg').classList.add('hidden');

      const newPassword = $('newPassword').value;
      const confirmPassword = $('confirmPassword').value;

      if (newPassword !== confirmPassword) {
        $('resetErrorMsg').textContent = 'Passwords do not match.';
        $('resetErrorMsg').classList.remove('hidden');
        return;
      }

      $('resetBtn').disabled = true;
      $('resetBtnText').textContent = 'Resetting…';
      $('resetBtnSpinner').classList.remove('hidden');

      try {
        const res = await fetch('/api/v1/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: resetToken, new_password: newPassword }),
        });
        const data = await res.json();

        if (!res.ok) {
          $('resetErrorMsg').textContent = data.detail || 'Reset failed.';
          $('resetErrorMsg').classList.remove('hidden');
          return;
        }

        $('resetSuccessMsg').textContent = '';
        const msg = document.createTextNode(data.message + ' ');
        const link = document.createElement('a');
        link.href = '/login';
        link.className = 'underline font-semibold';
        link.textContent = 'Sign in now \u2192';
        $('resetSuccessMsg').appendChild(msg);
        $('resetSuccessMsg').appendChild(link);
        $('resetSuccessMsg').classList.remove('hidden');
        $('resetForm').classList.add('hidden');
      } catch (err) {
        $('resetErrorMsg').textContent = 'Network error — please try again.';
        $('resetErrorMsg').classList.remove('hidden');
      } finally {
        $('resetBtn').disabled = false;
        $('resetBtnText').textContent = 'Reset Password';
        $('resetBtnSpinner').classList.add('hidden');
      }
    }
  </script>
<footer class="py-4 text-center text-[11px] text-muted/60">Developed by Sumit Malik</footer>
</body>
</html>
