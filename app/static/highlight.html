<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Highlight View — PlagiarismGuard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/static/js/common.js"></script>
  <script src="/static/js/auth.js"></script>
  <link rel="stylesheet" href="/static/css/theme.css" />
  <style>
    .highlight-high { background: rgba(239, 68, 68, 0.25); border-bottom: 2px solid #EF4444; cursor: pointer; }
    .highlight-medium { background: rgba(234, 179, 8, 0.20); border-bottom: 2px solid #EAB308; cursor: pointer; }
    .highlight-low { background: rgba(34, 197, 94, 0.15); border-bottom: 2px solid #22C55E; cursor: pointer; }
    .highlight-ai { background: rgba(168, 85, 247, 0.20); border-bottom: 2px solid #A855F7; cursor: pointer; }
    .source-panel { max-height: calc(100vh - 8rem); }
    .source-card { @apply border border-border/20 rounded-lg p-3 hover:border-primary/50 transition-all cursor-pointer; }
    .source-card.active { @apply border-primary bg-primary/5; }
    .text-panel { max-height: calc(100vh - 12rem); overflow-y: auto; line-height: 1.8; }
    .color-dot { @apply inline-block w-3 h-3 rounded-full mr-1; }
  </style>
</head>
<body class="bg-bg text-txt min-h-screen">

  <nav class="fixed top-0 left-0 right-0 z-50 bg-bg/80 backdrop-blur-xl border-b border-border/50">
    <div class="max-w-full mx-auto px-4 h-14 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 text-lg font-bold">
        <svg viewBox="0 0 40 40" class="w-7 h-7" xmlns="http://www.w3.org/2000/svg"><rect width="40" height="40" rx="8" fill="#4F46E5"/><rect x="10" y="7" width="18" height="24" rx="2" fill="white"/><path d="M22 7v6h6" fill="#E0E7FF"/><rect x="13" y="15" width="12" height="1.5" rx=".75" fill="#A5B4FC"/><rect x="13" y="19" width="10" height="1.5" rx=".75" fill="#A5B4FC"/><rect x="13" y="23" width="8" height="1.5" rx=".75" fill="#A5B4FC"/><circle cx="26" cy="27" r="7" fill="#22C55E"/><path d="M23 27l2 2 4-4" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        PlagiarismGuard
      </a>
      <div class="flex items-center gap-3">
        <span id="scoreDisplay" class="text-sm font-mono"></span>
        <a href="/app" class="text-sm text-txt/60 hover:text-primary">← Back to Dashboard</a>
        <button id="btnExportPdf" class="px-3 py-1.5 rounded-lg bg-primary text-white text-xs hover:bg-primary/80">Download PDF</button>
      </div>
    </div>
  </nav>

  <div class="flex pt-14 h-screen">
    <!-- Left: Document with highlights -->
    <div class="flex-1 p-6 overflow-hidden">
      <div class="mb-4 flex items-center gap-4">
        <h2 class="text-lg font-bold">Document</h2>
        <div class="flex gap-3 text-xs">
          <span><span class="color-dot bg-red-500"></span>High Match</span>
          <span><span class="color-dot bg-yellow-500"></span>Medium Match</span>
          <span><span class="color-dot bg-green-500"></span>Low Match</span>
          <span><span class="color-dot bg-purple-500"></span>AI Generated</span>
        </div>
      </div>
      <div id="documentText" class="text-panel bg-card border border-border/20 rounded-xl p-6 text-sm leading-relaxed">
        Loading...
      </div>
    </div>

    <!-- Right: Sources panel -->
    <div class="w-96 border-l border-border/20 p-4 source-panel overflow-y-auto">
      <h3 class="text-sm font-bold mb-3">Matched Sources</h3>
      <div id="sourcesList" class="space-y-2">
        <p class="text-txt/40 text-sm">Loading sources...</p>
      </div>

      <!-- Source detail -->
      <div id="sourceDetail" class="hidden mt-4 border-t border-border/20 pt-4">
        <h4 class="text-sm font-bold mb-2" id="detailTitle">Source</h4>
        <a id="detailUrl" href="#" target="_blank" class="text-xs text-primary hover:underline block mb-2 truncate"></a>
        <div class="text-xs text-txt/50 mb-2"><span id="detailSimilarity"></span> similarity</div>
        <div id="detailPassages" class="space-y-2 text-xs"></div>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('pg_token');
    if (!token) window.location.href = '/login';
    const hdr = () => ({ 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' });

    const params = new URLSearchParams(window.location.search);
    const docId = params.get('id');
    if (!docId) { document.getElementById('documentText').textContent = 'No document ID provided. Use ?id=YOUR_DOC_ID'; }

    let reportData = null;

    async function loadReport() {
      if (!docId) return;
      const r = await fetch(`/api/v1/auth/scans/${docId}`, { headers: hdr() });
      if (!r.ok) { document.getElementById('documentText').textContent = 'Scan not found or access denied.'; return; }
      const scan = await r.json();
      reportData = scan.report_json ? JSON.parse(scan.report_json) : scan;

      document.getElementById('scoreDisplay').innerHTML =
        `<span class="${scan.risk_level === 'HIGH' ? 'text-red-400' : scan.risk_level === 'MEDIUM' ? 'text-yellow-400' : 'text-green-400'}">
          ${scan.plagiarism_score?.toFixed(1)}% plagiarism</span> · ${scan.risk_level} risk`;

      renderHighlightedText(reportData);
      renderSources(reportData);
    }

    function renderHighlightedText(data) {
      const original = data.original_text || data.text_content || '';
      if (!original) { document.getElementById('documentText').textContent = 'Original text not available in this report.'; return; }

      const passages = data.flagged_passages || [];
      if (!passages.length) { document.getElementById('documentText').textContent = original; return; }

      // Sort passages by position in text (earliest first)
      const marks = [];
      passages.forEach((p, idx) => {
        const text = p.text || '';
        const pos = original.toLowerCase().indexOf(text.toLowerCase());
        if (pos >= 0) {
          const sim = p.similarity_score || 0;
          const isAi = (p.reason || '').toLowerCase().includes('ai');
          const cls = isAi ? 'highlight-ai' : sim > 0.7 ? 'highlight-high' : sim > 0.4 ? 'highlight-medium' : 'highlight-low';
          marks.push({ start: pos, end: pos + text.length, cls, idx, source: p.source || '' });
        }
      });

      marks.sort((a, b) => a.start - b.start);

      // Build highlighted HTML
      let html = '';
      let lastEnd = 0;
      marks.forEach(m => {
        if (m.start > lastEnd) html += escHtml(original.slice(lastEnd, m.start));
        if (m.start >= lastEnd) {
          html += `<span class="${m.cls}" data-source="${escAttr(m.source)}" data-idx="${m.idx}" title="Click to see source">${escHtml(original.slice(m.start, m.end))}</span>`;
          lastEnd = m.end;
        }
      });
      if (lastEnd < original.length) html += escHtml(original.slice(lastEnd));

      document.getElementById('documentText').innerHTML = html.replace(/\n/g, '<br>');

      // Click handler for highlights
      document.querySelectorAll('[data-source]').forEach(el => {
        el.onclick = () => {
          const src = el.dataset.source;
          if (src) showSourceDetail(src, data);
        };
      });
    }

    function renderSources(data) {
      const sources = data.detected_sources || [];
      if (!sources.length) { document.getElementById('sourcesList').innerHTML = '<p class="text-txt/40 text-sm">No sources detected.</p>'; return; }

      document.getElementById('sourcesList').innerHTML = sources.map((s, i) => `
        <div class="source-card" onclick="showSourceDetail('${escAttr(s.url || '')}', reportData, ${i})">
          <div class="flex items-center justify-between mb-1">
            <span class="text-xs font-bold text-primary">#${i + 1}</span>
            <span class="text-xs ${s.similarity > 0.7 ? 'text-red-400' : s.similarity > 0.4 ? 'text-yellow-400' : 'text-green-400'} font-mono">${(s.similarity * 100).toFixed(0)}%</span>
          </div>
          <div class="text-xs font-medium truncate">${s.title || 'Unknown Source'}</div>
          <div class="text-xs text-txt/40 truncate">${s.url || ''}</div>
          <div class="text-xs text-txt/50 mt-1">${s.text_blocks || 0} passages · ${s.matched_words || 0} words</div>
        </div>
      `).join('');
    }

    function showSourceDetail(url, data, sourceIdx) {
      const detail = document.getElementById('sourceDetail');
      detail.classList.remove('hidden');

      const source = (data.detected_sources || []).find(s => s.url === url) || {};
      document.getElementById('detailTitle').textContent = source.title || 'Source';
      const urlEl = document.getElementById('detailUrl');
      urlEl.href = url || '#';
      urlEl.textContent = url || 'N/A';
      document.getElementById('detailSimilarity').textContent = `${((source.similarity || 0) * 100).toFixed(0)}%`;

      const matchedPassages = (source.matched_passages || []).slice(0, 10);
      document.getElementById('detailPassages').innerHTML = matchedPassages.length
        ? matchedPassages.map(p => `<div class="bg-border/10 rounded p-2 text-txt/70">"${(p.text || '').slice(0, 200)}..."</div>`).join('')
        : '<p class="text-txt/40">No passage details available.</p>';

      // Highlight active source card
      document.querySelectorAll('.source-card').forEach((c, i) => c.classList.toggle('active', i === sourceIdx));
    }

    function escHtml(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
    function escAttr(s) { return s.replace(/'/g, '&#39;').replace(/"/g, '&quot;'); }

    document.getElementById('btnExportPdf').onclick = () => {
      window.open(`/api/v1/export-pdf/${docId}`, '_blank');
    };

    loadReport();
  </script>
</body>
</html>
