<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sign in to PlagiarismGuard — your AI-powered plagiarism detection dashboard. Access plagiarism reports, grammar checking, and academic writing tools." />
  <meta name="robots" content="noindex, nofollow" />
  <meta property="og:title" content="Sign In — PlagiarismGuard" />
  <meta property="og:description" content="Sign in to access your plagiarism detection dashboard." />
  <link rel="canonical" href="https://plagiarismguard-jl6yu5wij5mu4.azurewebsites.net/login" />
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <title>Sign In — PlagiarismGuard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg:       '#0f1117',
            surface:  '#1a1d27',
            surface2: '#242836',
            border:   '#2e3348',
            txt:      '#e1e4ed',
            muted:    '#8b8fa3',
            accent:   '#6c5ce7',
            'accent-l':'#a29bfe',
            ok:       '#00b894',
            warn:     '#fdcb6e',
            danger:   '#e17055',
          }
        }
      }
    }
  </script>
  <style>
    @keyframes float1 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(30px,-40px) scale(1.1); } }
    @keyframes float2 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-20px,30px) scale(1.15); } }
    @keyframes float3 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(15px,25px) scale(1.05); } }
    .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: .18; pointer-events: none; }
    .orb-1 { width: 500px; height: 500px; background: #6c5ce7; top: -120px; left: -80px; animation: float1 8s ease-in-out infinite; }
    .orb-2 { width: 400px; height: 400px; background: #00b894; bottom: -100px; right: -60px; animation: float2 10s ease-in-out infinite; }
    .orb-3 { width: 300px; height: 300px; background: #e17055; top: 50%; left: 50%; transform: translate(-50%,-50%); animation: float3 12s ease-in-out infinite; }
    .gradient-text {
      background: linear-gradient(135deg, #a29bfe 0%, #6c5ce7 30%, #00b894 70%, #4ECDC4 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .glow-input:focus { border-color: #6c5ce7; box-shadow: 0 0 0 3px rgba(108,92,231,.15); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up { animation: fadeUp .6s ease-out both; }
    .fade-up-d1 { animation-delay: .1s; }
    .fade-up-d2 { animation-delay: .2s; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin .8s linear infinite; }

    /* Fun loading overlay */
    .loading-overlay {
      position: fixed; inset: 0; z-index: 50;
      background: rgba(15,17,23,.92); backdrop-filter: blur(12px);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity .3s ease;
    }
    .loading-overlay.active { opacity: 1; pointer-events: auto; }
    @keyframes bounce-dot { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }
    .bounce-dots span {
      display: inline-block; width: 12px; height: 12px; border-radius: 50%;
      background: #6c5ce7; margin: 0 4px;
      animation: bounce-dot 1.4s infinite ease-in-out both;
    }
    .bounce-dots span:nth-child(1) { animation-delay: -.32s; }
    .bounce-dots span:nth-child(2) { animation-delay: -.16s; }
    @keyframes fadeSwap { 0% { opacity: 0; transform: translateY(8px); } 15% { opacity: 1; transform: translateY(0); } 85% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-8px); } }
    .loading-msg { animation: fadeSwap 2s ease-in-out; }
    @keyframes progress-fill { from { width: 0; } }
    .progress-track { width: 220px; height: 4px; border-radius: 4px; background: #2e3348; overflow: hidden; margin-top: 20px; }
    .progress-bar { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #6c5ce7, #00b894); animation: progress-fill 25s ease-out forwards; }
    @keyframes wiggle { 0%,100% { transform: rotate(0); } 25% { transform: rotate(-8deg); } 75% { transform: rotate(8deg); } }
    .wiggle { display: inline-block; animation: wiggle .6s ease-in-out infinite; }
  </style>
</head>
<body class="bg-bg text-txt min-h-screen flex items-center justify-center relative overflow-hidden">

  <!-- Fun loading overlay -->
  <div id="loadingOverlay" class="loading-overlay">
    <div class="text-5xl mb-6 wiggle" id="loadingEmoji">🔐</div>
    <div class="bounce-dots mb-4"><span></span><span></span><span></span></div>
    <p class="text-lg font-semibold text-txt" id="loadingMsg">Waking up the servers…</p>
    <p class="text-xs text-muted mt-2" id="loadingSub">This takes a few seconds on the first visit</p>
    <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
  </div>

  <!-- Background orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Card -->
  <div class="relative z-10 w-full max-w-md px-6">
    <!-- Logo -->
    <div class="flex items-center justify-center gap-3 mb-8 fade-up">
      <div class="w-10 h-10 bg-gradient-to-br from-accent to-[#00b894] rounded-xl grid place-items-center shadow-lg shadow-accent/20"><svg viewBox="0 0 64 64" class="w-7 h-7" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="14" y="8" width="30" height="38" rx="3" fill="white" opacity=".95"/><path d="M36 8L46 18H36Z" fill="#c7d2fe"/><rect x="19" y="22" width="18" height="2.5" rx="1" fill="#6366f1" opacity=".5"/><rect x="19" y="28" width="14" height="2.5" rx="1" fill="#6366f1" opacity=".5"/><rect x="19" y="34" width="16" height="2.5" rx="1" fill="#6366f1" opacity=".5"/><path d="M44 36l8 3.5V46c0 4.5-4 7.5-8 9-4-1.5-8-4.5-8-9v-6.5Z" fill="#22c55e"/><polyline points="40,43 43,46 48,41" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <span class="text-xl font-bold">PlagiarismGuard</span>
    </div>

    <div class="bg-surface/80 backdrop-blur-xl border border-border rounded-2xl p-8 shadow-2xl fade-up fade-up-d1">
      <h1 class="text-2xl font-bold text-center mb-1">Sign in to PlagiarismGuard</h1>
      <p class="text-sm text-muted text-center mb-1">Access your plagiarism detection dashboard</p>
      <p class="text-sm text-muted text-center mb-6">Sign in to your PlagiarismGuard account</p>

      <!-- Error message -->
      <div id="errorMsg" class="hidden mb-4 p-3 rounded-lg bg-danger/15 border border-danger/30 text-danger text-sm"></div>

      <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-4">
        <!-- Email -->
        <div>
          <label for="email" class="block text-sm font-medium text-muted mb-1.5">Email Address</label>
          <input id="email" type="email" required autocomplete="email"
            class="w-full px-4 py-2.5 bg-surface2 border border-border rounded-xl text-txt placeholder-muted/60 outline-none glow-input transition-all"
            placeholder="jane@example.com" />
        </div>

        <!-- Password -->
        <div>
          <div class="flex items-center justify-between mb-1.5">
            <label for="password" class="block text-sm font-medium text-muted">Password</label>
            <a href="/forgot-password" class="text-xs text-accent-l hover:text-accent transition-colors">Forgot password?</a>
          </div>
          <div class="relative">
            <input id="password" type="password" required autocomplete="current-password"
              class="w-full px-4 py-2.5 pr-10 bg-surface2 border border-border rounded-xl text-txt placeholder-muted/60 outline-none glow-input transition-all"
              placeholder="Enter your password" />
            <button type="button" onclick="togglePasswordVisibility('password', this)" aria-label="Toggle password visibility"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-muted hover:text-txt transition-colors">
              <svg class="eye-open" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-closed hidden" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button id="submitBtn" type="submit"
          class="w-full py-3 bg-gradient-to-r from-accent to-[#5a4bd1] text-white rounded-xl font-semibold text-[15px] hover:shadow-lg hover:shadow-accent/25 hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:translate-y-0">
          <span id="btnText">Sign In</span>
          <svg id="btnSpinner" class="hidden spinner" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10" stroke-dasharray="32" stroke-dashoffset="32" stroke-linecap="round"/></svg>
        </button>
      </form>

      <p class="text-sm text-muted text-center mt-6">
        Don't have an account?
        <a href="/signup" class="text-accent-l hover:text-accent font-medium transition-colors">Sign up</a>
      </p>
    </div>
  </div>

  <script>
    function $(id) { return document.getElementById(id); }

    function showError(msg) {
      const el = $('errorMsg');
      el.textContent = msg;
      el.classList.remove('hidden');
    }
    function hideError() {
      $('errorMsg').classList.add('hidden');
    }

    /* Fun loading overlay controller — 10 unique steps = 20s before any repeat */
    const funSteps = [
      { emoji: '🔐', msg: 'Unlocking your research vault…' },
      { emoji: '📖', msg: 'Dusting off your manuscripts…' },
      { emoji: '🎓', msg: 'Checking your academic credentials…' },
      { emoji: '🧠', msg: 'Warming up the AI brain…' },
      { emoji: '📡', msg: 'Connecting to scholarly databases…' },
      { emoji: '🔬', msg: 'Calibrating the plagiarism detector…' },
      { emoji: '📚', msg: 'Indexing 250M+ research papers…' },
      { emoji: '☕', msg: 'Brewing a cup of knowledge…' },
      { emoji: '🚀', msg: 'Almost there, preparing your desk…' },
      { emoji: '✨', msg: 'Polishing your dashboard…' },
    ];
    let stepTimer = null;

    function showLoadingOverlay() {
      const overlay = $('loadingOverlay');
      overlay.classList.add('active');
      const bar = $('progressBar');
      bar.style.animation = 'none'; bar.offsetHeight; bar.style.animation = '';
      let idx = 0;
      updateStep(idx);
      stepTimer = setInterval(() => {
        idx = (idx + 1) % funSteps.length;
        updateStep(idx);
      }, 2000);
    }
    function hideLoadingOverlay() {
      clearInterval(stepTimer);
      $('loadingOverlay').classList.remove('active');
    }
    function updateStep(i) {
      const s = funSteps[i];
      $('loadingEmoji').textContent = s.emoji;
      const el = $('loadingMsg');
      el.textContent = s.msg;
      el.classList.remove('loading-msg');
      void el.offsetWidth;
      el.classList.add('loading-msg');
    }

    function togglePasswordVisibility(inputId, btn) {
      const input = $(inputId);
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
      btn.querySelector('.eye-open').classList.toggle('hidden', isPassword);
      btn.querySelector('.eye-closed').classList.toggle('hidden', !isPassword);
    }

    async function handleLogin(e) {
      e.preventDefault();
      hideError();

      const email = $('email').value.trim();
      const password = $('password').value;

      // Disable button + show spinner
      $('submitBtn').disabled = true;
      $('btnText').textContent = 'Signing in…';
      $('btnSpinner').classList.remove('hidden');

      // Show fun overlay after a brief delay (instant responses skip it)
      const overlayDelay = setTimeout(showLoadingOverlay, 800);

      let res, data;
      const maxRetries = 2;
      for (let attempt = 0; attempt <= maxRetries; attempt++) {
        try {
          res = await fetch('/api/v1/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password }),
          });
          data = await res.json();
          // Retry on 503 (DB waking up) — not on 401 (bad credentials)
          if (res.status === 503 && attempt < maxRetries) {
            await new Promise(r => setTimeout(r, 3000));
            continue;
          }
          break;
        } catch (err) {
          if (attempt < maxRetries) {
            await new Promise(r => setTimeout(r, 3000));
            continue;
          }
          clearTimeout(overlayDelay);
          hideLoadingOverlay();
          showError('Network error — please try again.');
          $('submitBtn').disabled = false;
          $('btnText').textContent = 'Sign In';
          $('btnSpinner').classList.add('hidden');
          return;
        }
      }
      clearTimeout(overlayDelay);

      if (!res.ok) {
        hideLoadingOverlay();
        showError(data.detail || 'Login failed. Please try again.');
        $('submitBtn').disabled = false;
        $('btnText').textContent = 'Sign In';
        $('btnSpinner').classList.add('hidden');
        return;
      }

      // Show success step before redirect
      $('loadingEmoji').textContent = '🎉';
      $('loadingMsg').textContent = "You're in! Redirecting…";
      $('loadingSub').textContent = '';
      clearInterval(stepTimer);
      if (!$('loadingOverlay').classList.contains('active')) showLoadingOverlay();

      // Save token + user info
      localStorage.setItem('pg_token', data.token);
      if (data.refresh_token) localStorage.setItem('pg_refresh_token', data.refresh_token);
      if (data.user && typeof data.user === 'object' && data.user.id && data.user.email) {
        localStorage.setItem('pg_user', JSON.stringify(data.user));
      }

      // Brief pause so user sees success, then redirect
      await new Promise(r => setTimeout(r, 600));
      const params = new URLSearchParams(window.location.search);
      const redirect = params.get('redirect');
      const safeRedirect = (redirect && redirect.startsWith('/') && !redirect.startsWith('//')) ? redirect : '/app';
      window.location.href = safeRedirect;
    }

    // If already logged in, redirect
    if (localStorage.getItem('pg_token')) {
      const params = new URLSearchParams(window.location.search);
      const redirect = params.get('redirect');
      const safeRedirect = (redirect && redirect.startsWith('/') && !redirect.startsWith('//')) ? redirect : '/app';
      window.location.href = safeRedirect;
    }
  </script>
</body>
</html>
