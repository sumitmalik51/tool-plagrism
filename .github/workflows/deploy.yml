# ---------------------------------------------------------------------------
# PlagiarismGuard — V2 CI/CD Pipeline (Optimized)
# Smart conditional execution based on what changed:
#   - infra/** changed  → provision infra + deploy app (skip tests)
#   - app/tests/etc     → run backend tests + deploy backend (skip infra)
#   - frontend/**       → lint/build + deploy Next.js frontend
#   - both changed      → tests + infra + deploy affected apps
#
# Speed optimisations:
#   1. .python_packages/ cached across runs (keyed on requirements-prod.txt)
#   2. Bloat stripped from packages (tests, docs, *.dist-info) → smaller zip
#   3. resolve job merged into deploy (one fewer runner spin-up)
#   4. Prod-only deps (no pytest in deploy package)
#   5. Health-check uses retry loop instead of blind sleep 30
# ---------------------------------------------------------------------------

name: CI/CD — Build, Test & Deploy to Azure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "22"
  AZURE_RESOURCE_GROUP: "rg-plagiarismguard"
  AZURE_LOCATION: "eastus"

jobs:
  # -----------------------------------------------------------------------
  # Job 0: Detect what changed
  # -----------------------------------------------------------------------
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      app: ${{ steps.filter.outputs.app }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            infra:
              - 'infra/**'
            app:
              - 'app/**'
              - 'tests/**'
              - 'requirements.txt'
              - 'requirements-prod.txt'
              - 'startup.sh'
              - 'pyproject.toml'
              - '.github/workflows/**'
              - 'app/static/**'
              - 'openai-foundry.json'
            frontend:
              - 'frontend/**'
              - '.github/workflows/**'

  # -----------------------------------------------------------------------
  # Job 1: Backend tests (only when backend app code changed)
  # -----------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.app == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall app tests

      - name: Run tests
        timeout-minutes: 10
        run: python -m pytest tests/ -v --tb=short --timeout=15

  # -----------------------------------------------------------------------
  # Job 2: Frontend checks (only when Next.js frontend changed)
  # -----------------------------------------------------------------------
  frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  # -----------------------------------------------------------------------
  # Job 3: Provision Infrastructure (only when infra changed)
  # -----------------------------------------------------------------------
  infra:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.infra == 'true')

    outputs:
      webAppName: ${{ steps.deploy-bicep.outputs.webAppName }}
      webAppUrl: ${{ steps.deploy-bicep.outputs.webAppUrl }}
      frontendWebAppName: ${{ steps.deploy-bicep.outputs.frontendWebAppName }}
      frontendWebAppUrl: ${{ steps.deploy-bicep.outputs.frontendWebAppUrl }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          auth-type: SERVICE_PRINCIPAL

      - name: Create Resource Group (if needed)
        uses: azure/cli@v2
        with:
          inlineScript: |
            az group create \
              --name ${{ env.AZURE_RESOURCE_GROUP }} \
              --location ${{ env.AZURE_LOCATION }} \
              --tags project=plagiarismguard environment=production

      - name: Validate Bicep template
        uses: azure/cli@v2
        with:
          inlineScript: |
            az deployment group validate \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --template-file infra/main.bicep \
              --parameters @infra/parameters.json

      - name: Validate backend production secrets
        env:
          PG_JWT_SECRET: ${{ secrets.PG_JWT_SECRET }}
          PG_SQL_CONNECTION_STRING: ${{ secrets.PG_SQL_CONNECTION_STRING }}
          PG_AZURE_OPENAI_API_KEY: ${{ secrets.PG_AZURE_OPENAI_API_KEY }}
          PG_AZURE_OPENAI_ENDPOINT: ${{ secrets.PG_AZURE_OPENAI_ENDPOINT }}
        run: |
          set -euo pipefail
          missing=()
          for name in PG_JWT_SECRET PG_SQL_CONNECTION_STRING PG_AZURE_OPENAI_API_KEY PG_AZURE_OPENAI_ENDPOINT; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required GitHub Actions secrets: ${missing[*]}"
            exit 1
          fi

      - name: Preview Bicep changes
        uses: azure/cli@v2
        env:
          PG_JWT_SECRET: ${{ secrets.PG_JWT_SECRET }}
          PG_SQL_CONNECTION_STRING: ${{ secrets.PG_SQL_CONNECTION_STRING }}
          PG_AZURE_OPENAI_API_KEY: ${{ secrets.PG_AZURE_OPENAI_API_KEY }}
          PG_AZURE_OPENAI_ENDPOINT: ${{ secrets.PG_AZURE_OPENAI_ENDPOINT }}
        with:
          inlineScript: |
            az deployment group what-if \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --template-file infra/main.bicep \
              --parameters @infra/parameters.json \
              --parameters bingApiKey='${{ secrets.PG_BING_API_KEY }}' \
              --parameters googleClientId='${{ secrets.PG_GOOGLE_CLIENT_ID || secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}' \
              --parameters jwtSecret="$PG_JWT_SECRET" \
              --parameters sqlConnectionString="$PG_SQL_CONNECTION_STRING" \
              --parameters azureOpenAiEndpoint="$PG_AZURE_OPENAI_ENDPOINT" \
              --parameters azureOpenAiApiKey="$PG_AZURE_OPENAI_API_KEY"

      - name: Deploy Bicep template
        id: deploy-bicep
        uses: azure/cli@v2
        env:
          PG_JWT_SECRET: ${{ secrets.PG_JWT_SECRET }}
          PG_SQL_CONNECTION_STRING: ${{ secrets.PG_SQL_CONNECTION_STRING }}
          PG_AZURE_OPENAI_API_KEY: ${{ secrets.PG_AZURE_OPENAI_API_KEY }}
          PG_AZURE_OPENAI_ENDPOINT: ${{ secrets.PG_AZURE_OPENAI_ENDPOINT }}
        with:
          inlineScript: |
            result=$(az deployment group create \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --template-file infra/main.bicep \
              --parameters @infra/parameters.json \
              --parameters bingApiKey='${{ secrets.PG_BING_API_KEY }}' \
              --parameters googleClientId='${{ secrets.PG_GOOGLE_CLIENT_ID || secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}' \
              --parameters jwtSecret="$PG_JWT_SECRET" \
              --parameters sqlConnectionString="$PG_SQL_CONNECTION_STRING" \
              --parameters azureOpenAiEndpoint="$PG_AZURE_OPENAI_ENDPOINT" \
              --parameters azureOpenAiApiKey="$PG_AZURE_OPENAI_API_KEY" \
              --query 'properties.outputs' \
              --output json)

            webAppName=$(echo $result | jq -r '.webAppName.value')
            webAppUrl=$(echo $result | jq -r '.webAppUrl.value')
            frontendWebAppName=$(echo $result | jq -r '.frontendWebAppName.value')
            frontendWebAppUrl=$(echo $result | jq -r '.frontendWebAppUrl.value')

            echo "webAppName=$webAppName" >> "$GITHUB_OUTPUT"
            echo "webAppUrl=$webAppUrl" >> "$GITHUB_OUTPUT"
            echo "frontendWebAppName=$frontendWebAppName" >> "$GITHUB_OUTPUT"
            echo "frontendWebAppUrl=$frontendWebAppUrl" >> "$GITHUB_OUTPUT"
            echo "### 🚀 Infrastructure Deployed" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Backend Web App**: $webAppName" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Backend URL**: $webAppUrl" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Frontend Web App**: $frontendWebAppName" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Frontend URL**: $frontendWebAppUrl" >> "$GITHUB_STEP_SUMMARY"

  # -----------------------------------------------------------------------
  # Job 4: Deploy application to Azure Web Apps
  # - Backend package contains only FastAPI app code; dependencies are installed
  #   by startup.sh into a persistent venv at /home/site/venv/.
  # - Frontend package contains the Next.js standalone server bundle.
  # - Resolves app names inline (no separate job)
  # -----------------------------------------------------------------------
  deploy:
    name: Deploy to Azure Web Apps
    runs-on: ubuntu-latest
    needs: [changes, test, frontend, infra]
    if: >-
      always() &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'workflow_dispatch' ||
       needs.changes.outputs.app == 'true' ||
       needs.changes.outputs.frontend == 'true' ||
       needs.changes.outputs.infra == 'true') &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')

    environment:
      name: production
      url: ${{ steps.resolve-names.outputs.frontendUrl }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # -- Resolve Web App names (from infra output or Azure query) --------
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          auth-type: SERVICE_PRINCIPAL

      - name: Resolve Web App names
        id: resolve-names
        run: |
          APP_BASE=$(jq -r '.parameters.appName.value // "plagiarismguard"' infra/parameters.json)

          BACKEND_NAME="${{ needs.infra.outputs.webAppName }}"
          FRONTEND_NAME="${{ needs.infra.outputs.frontendWebAppName }}"

          if [ -z "$BACKEND_NAME" ] || [ "$BACKEND_NAME" = "" ]; then
            BACKEND_NAME=$(az webapp list \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --query "[].name" \
              --output tsv | awk -v base="$APP_BASE" 'index($0, base "-") == 1 && index($0, base "-web-") != 1 { print; exit }')
          fi

          if [ -z "$FRONTEND_NAME" ] || [ "$FRONTEND_NAME" = "" ]; then
            FRONTEND_NAME=$(az webapp list \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --query "[].name" \
              --output tsv | awk -v base="$APP_BASE" 'index($0, base "-web-") == 1 { print; exit }')
          fi

          if [ -z "$BACKEND_NAME" ]; then
            echo "Could not resolve backend Web App name" >&2
            exit 1
          fi
          if [ -z "$FRONTEND_NAME" ]; then
            echo "Could not resolve frontend Web App name. Run this workflow with infra changes first." >&2
            exit 1
          fi

          BACKEND_HOST=$(az webapp show \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name "$BACKEND_NAME" \
            --query defaultHostName --output tsv)
          FRONTEND_HOST=$(az webapp show \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name "$FRONTEND_NAME" \
            --query defaultHostName --output tsv)

          echo "backendName=$BACKEND_NAME" >> "$GITHUB_OUTPUT"
          echo "backendUrl=https://$BACKEND_HOST" >> "$GITHUB_OUTPUT"
          echo "frontendName=$FRONTEND_NAME" >> "$GITHUB_OUTPUT"
          echo "frontendUrl=https://$FRONTEND_HOST" >> "$GITHUB_OUTPUT"
          echo "Resolved backend: $BACKEND_NAME"
          echo "Resolved frontend: $FRONTEND_NAME"

      # -- Backend package/deploy -----------------------------------------
      - name: Create backend deployment package
        if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.app == 'true' || needs.changes.outputs.infra == 'true'
        run: |
          chmod +x startup.sh
          zip -r -q deploy.zip \
            app/ \
            openai-foundry.json \
            requirements-prod.txt \
            startup.sh \
            -x "app/__pycache__/*" "app/**/__pycache__/*" "*.pyc"
          echo "📦 Backend package size: $(du -h deploy.zip | cut -f1)"
          echo "📋 Backend zip contents:"
          unzip -l deploy.zip | tail -5

      - name: Sync backend runtime settings
        if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.app == 'true' || needs.changes.outputs.infra == 'true'
        env:
          PG_JWT_SECRET: ${{ secrets.PG_JWT_SECRET }}
          PG_SQL_CONNECTION_STRING: ${{ secrets.PG_SQL_CONNECTION_STRING }}
          PG_AZURE_OPENAI_API_KEY: ${{ secrets.PG_AZURE_OPENAI_API_KEY }}
          PG_AZURE_OPENAI_ENDPOINT: ${{ secrets.PG_AZURE_OPENAI_ENDPOINT }}
        run: |
          set -euo pipefail
          missing=()
          for name in PG_JWT_SECRET PG_SQL_CONNECTION_STRING PG_AZURE_OPENAI_API_KEY PG_AZURE_OPENAI_ENDPOINT; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required GitHub Actions secrets: ${missing[*]}"
            exit 1
          fi

          az webapp config appsettings set \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ steps.resolve-names.outputs.backendName }} \
            --settings \
              SCM_COMMAND_IDLE_TIMEOUT=1800 \
              PG_JWT_SECRET="$PG_JWT_SECRET" \
              PG_SQL_CONNECTION_STRING="$PG_SQL_CONNECTION_STRING" \
              PG_AZURE_OPENAI_ENDPOINT="$PG_AZURE_OPENAI_ENDPOINT" \
              PG_AZURE_OPENAI_API_KEY="$PG_AZURE_OPENAI_API_KEY" \
            --output none

          az webapp config set \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ steps.resolve-names.outputs.backendName }} \
            --startup-file "bash /home/site/wwwroot/startup.sh" \
            --output none

      - name: Deploy backend to Azure Web App
        id: deploy-backend
        if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.app == 'true' || needs.changes.outputs.infra == 'true'
        run: |
          set -euo pipefail
          app_name="${{ steps.resolve-names.outputs.backendName }}"
          echo "Uploading deploy.zip ($(du -h deploy.zip | cut -f1)) via Kudu ZipDeploy..."

          creds_json=$(az webapp deployment list-publishing-credentials \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name "$app_name" \
            --query '{user:publishingUserName,pass:publishingPassword}' \
            --output json)
          publish_user=$(echo "$creds_json" | jq -r '.user')
          publish_pass=$(echo "$creds_json" | jq -r '.pass')

          headers_file=$(mktemp)
          body_file=$(mktemp)
          http_code=$(curl -sS --retry 3 --retry-delay 5 \
            --connect-timeout 10 \
            --max-time 300 \
            -D "$headers_file" \
            -o "$body_file" \
            -w "%{http_code}" \
            -X POST "https://$app_name.scm.azurewebsites.net/api/zipdeploy?isAsync=true" \
            -u "$publish_user:$publish_pass" \
            --data-binary @deploy.zip)

          if [ "$http_code" != "200" ] && [ "$http_code" != "202" ]; then
            echo "Kudu ZipDeploy failed to start (HTTP $http_code)." >&2
            sed -e 's/[[:cntrl:]]//g' "$body_file" | head -20 >&2
            exit 1
          fi

          echo "✅ Backend package accepted by Kudu (HTTP $http_code)."
          sleep 15

          echo "🔄 Restarting app..."
          az webapp restart \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ steps.resolve-names.outputs.backendName }}

          echo "webapp-url=${{ steps.resolve-names.outputs.backendUrl }}" >> "$GITHUB_OUTPUT"

      # -- Frontend package/deploy ----------------------------------------
      - name: Set up Node.js ${{ env.NODE_VERSION }} for frontend deploy
        if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.infra == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend standalone package
        if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.infra == 'true'
        env:
          NEXT_PUBLIC_API_URL: ${{ steps.resolve-names.outputs.backendUrl }}
          NEXT_PUBLIC_SITE_URL: ${{ steps.resolve-names.outputs.frontendUrl }}
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.PG_GOOGLE_CLIENT_ID || secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
          NEXT_TELEMETRY_DISABLED: "1"
        run: |
          npm ci --prefix frontend
          npm run build --prefix frontend

          rm -rf frontend-deploy frontend-deploy.zip
          mkdir -p frontend-deploy/.next
          cp -R frontend/.next/standalone/. frontend-deploy/
          cp -R frontend/.next/static frontend-deploy/.next/static
          if [ -d frontend/public ]; then
            cp -R frontend/public frontend-deploy/public
          fi

          (cd frontend-deploy && zip -r -q ../frontend-deploy.zip .)
          echo "📦 Frontend package size: $(du -h frontend-deploy.zip | cut -f1)"

      - name: Sync frontend runtime settings
        if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.infra == 'true'
        run: |
          az webapp config appsettings set \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ steps.resolve-names.outputs.frontendName }} \
            --settings \
              SCM_COMMAND_IDLE_TIMEOUT=600 \
              NODE_ENV=production \
              NEXT_TELEMETRY_DISABLED=1 \
              NEXT_PUBLIC_API_URL=${{ steps.resolve-names.outputs.backendUrl }} \
              NEXT_PUBLIC_SITE_URL=${{ steps.resolve-names.outputs.frontendUrl }} \
              NEXT_PUBLIC_GOOGLE_CLIENT_ID='${{ secrets.PG_GOOGLE_CLIENT_ID || secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}' \
            --output none

          az webapp config set \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ steps.resolve-names.outputs.frontendName }} \
            --startup-file "node server.js" \
            --output none

      - name: Deploy frontend to Azure Web App
        id: deploy-frontend
        if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.infra == 'true'
        run: |
          set -euo pipefail
          app_name="${{ steps.resolve-names.outputs.frontendName }}"
          echo "Uploading frontend-deploy.zip ($(du -h frontend-deploy.zip | cut -f1)) via Kudu ZipDeploy..."

          creds_json=$(az webapp deployment list-publishing-credentials \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name "$app_name" \
            --query '{user:publishingUserName,pass:publishingPassword}' \
            --output json)
          publish_user=$(echo "$creds_json" | jq -r '.user')
          publish_pass=$(echo "$creds_json" | jq -r '.pass')

          headers_file=$(mktemp)
          body_file=$(mktemp)
          http_code=$(curl -sS --retry 3 --retry-delay 5 \
            --connect-timeout 10 \
            --max-time 300 \
            -D "$headers_file" \
            -o "$body_file" \
            -w "%{http_code}" \
            -X POST "https://$app_name.scm.azurewebsites.net/api/zipdeploy?isAsync=true" \
            -u "$publish_user:$publish_pass" \
            --data-binary @frontend-deploy.zip)

          if [ "$http_code" != "200" ] && [ "$http_code" != "202" ]; then
            echo "Kudu ZipDeploy failed to start (HTTP $http_code)." >&2
            sed -e 's/[[:cntrl:]]//g' "$body_file" | head -20 >&2
            exit 1
          fi

          echo "✅ Frontend package accepted by Kudu (HTTP $http_code)."
          sleep 15

          echo "🔄 Restarting frontend app..."
          az webapp restart \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ steps.resolve-names.outputs.frontendName }}

          echo "webapp-url=${{ steps.resolve-names.outputs.frontendUrl }}" >> "$GITHUB_OUTPUT"

      # -- Health check (first deploy takes ~8 min for pip install) --------
      - name: Verify backend deployment
        if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.app == 'true' || needs.changes.outputs.infra == 'true'
        run: |
          url="${{ steps.resolve-names.outputs.backendUrl }}/health"
          echo "Waiting for backend at: $url"
          echo "⏳ First deploy installs deps (~10-16 min). Polling for 20 min..."

          for i in $(seq 1 180); do
            sleep 5
            status=$(curl -s --connect-timeout 3 --max-time 5 -o /dev/null -w "%{http_code}" "$url" || echo "000")
            echo "  Attempt $i/180 → HTTP $status  ($(( i * 10 ))s elapsed)"
            if [ "$status" = "200" ]; then
              echo "✅ Health check passed!"
              curl -s --connect-timeout 3 --max-time 5 "$url" | head -5
              exit 0
            fi
          done

          echo "❌ Backend did not return 200 after 1800s"
          echo "   Check Docker logs: az webapp log tail -g ${{ env.AZURE_RESOURCE_GROUP }} -n ${{ steps.resolve-names.outputs.backendName }}"

          echo "### 🏥 Backend Health Check" >> "$GITHUB_STEP_SUMMARY"
          echo "- **URL**: $url" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status**: HTTP $status" >> "$GITHUB_STEP_SUMMARY"
          exit 1

      - name: Verify frontend deployment
        if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.infra == 'true'
        run: |
          url="${{ steps.resolve-names.outputs.frontendUrl }}/"
          echo "Waiting for frontend at: $url"
          echo "⏳ Polling for 10 min..."

          for i in $(seq 1 60); do
            sleep 5
            status=$(curl -L -s --connect-timeout 3 --max-time 5 -o /dev/null -w "%{http_code}" "$url" || echo "000")
            echo "  Attempt $i/60 → HTTP $status  ($(( i * 10 ))s elapsed)"
            if [ "$status" = "200" ]; then
              echo "✅ Frontend health check passed!"
              exit 0
            fi
          done

          echo "❌ Frontend did not return 200 after 600s"
          echo "   Check logs: az webapp log tail -g ${{ env.AZURE_RESOURCE_GROUP }} -n ${{ steps.resolve-names.outputs.frontendName }}"
          exit 1

      - name: Deployment summary
        if: always()
        run: |
          echo "### 🚀 V2 Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Backend**: ${{ steps.resolve-names.outputs.backendUrl }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Frontend**: ${{ steps.resolve-names.outputs.frontendUrl }}" >> "$GITHUB_STEP_SUMMARY"
