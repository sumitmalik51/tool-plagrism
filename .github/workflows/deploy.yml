# ---------------------------------------------------------------------------
# PlagiarismGuard — CI/CD Pipeline
# Smart conditional execution based on what changed:
#   - infra/** changed  → provision infra + deploy app (skip tests)
#   - app/tests/etc     → run tests + deploy app (skip infra)
#   - both changed      → tests + infra + deploy
# ---------------------------------------------------------------------------

name: CI/CD — Build, Test & Deploy to Azure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.13"
  AZURE_RESOURCE_GROUP: "rg-plagiarismguard"
  AZURE_LOCATION: "eastus"

jobs:
  # -----------------------------------------------------------------------
  # Job 0: Detect what changed
  # -----------------------------------------------------------------------
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      app: ${{ steps.filter.outputs.app }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            infra:
              - 'infra/**'
            app:
              - 'app/**'
              - 'tests/**'
              - 'requirements.txt'
              - 'startup.sh'
              - 'static/**'

  # -----------------------------------------------------------------------
  # Job 1: Test (only when app code changed)
  # -----------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.app == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  # -----------------------------------------------------------------------
  # Job 2: Provision Infrastructure (only when infra changed)
  # -----------------------------------------------------------------------
  infra:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.infra == 'true')

    outputs:
      webAppName: ${{ steps.deploy-bicep.outputs.webAppName }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          auth-type: SERVICE_PRINCIPAL

      - name: Create Resource Group (if needed)
        uses: azure/cli@v2
        with:
          inlineScript: |
            az group create \
              --name ${{ env.AZURE_RESOURCE_GROUP }} \
              --location ${{ env.AZURE_LOCATION }} \
              --tags project=plagiarismguard environment=production

      - name: Validate Bicep template
        uses: azure/cli@v2
        with:
          inlineScript: |
            az deployment group validate \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --template-file infra/main.bicep \
              --parameters @infra/parameters.json

      - name: Deploy Bicep template
        id: deploy-bicep
        uses: azure/cli@v2
        with:
          inlineScript: |
            result=$(az deployment group create \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --template-file infra/main.bicep \
              --parameters @infra/parameters.json \
              --parameters bingApiKey='${{ secrets.PG_BING_API_KEY }}' \
              --query 'properties.outputs' \
              --output json)

            webAppName=$(echo $result | jq -r '.webAppName.value')
            webAppUrl=$(echo $result | jq -r '.webAppUrl.value')

            echo "webAppName=$webAppName" >> "$GITHUB_OUTPUT"
            echo "webAppUrl=$webAppUrl" >> "$GITHUB_OUTPUT"
            echo "### 🚀 Infrastructure Deployed" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Web App**: $webAppName" >> "$GITHUB_STEP_SUMMARY"
            echo "- **URL**: $webAppUrl" >> "$GITHUB_STEP_SUMMARY"

  # -----------------------------------------------------------------------
  # Job 3: Resolve Web App name
  # Uses infra output if infra ran, otherwise fetches from Azure directly
  # -----------------------------------------------------------------------
  resolve:
    name: Resolve Web App Name
    runs-on: ubuntu-latest
    needs: [changes, test, infra]
    if: >-
      always() &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'workflow_dispatch' ||
       needs.changes.outputs.app == 'true' ||
       needs.changes.outputs.infra == 'true') &&
      !contains(needs.*.result, 'failure')
    outputs:
      webAppName: ${{ steps.resolve-name.outputs.webAppName }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          auth-type: SERVICE_PRINCIPAL

      - name: Resolve app name
        id: resolve-name
        run: |
          # Use infra output if available, otherwise query Azure
          INFRA_NAME="${{ needs.infra.outputs.webAppName }}"
          if [ -n "$INFRA_NAME" ] && [ "$INFRA_NAME" != "" ]; then
            echo "webAppName=$INFRA_NAME" >> "$GITHUB_OUTPUT"
            echo "Resolved from infra job: $INFRA_NAME"
          else
            APP_NAME=$(az webapp list \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --query '[0].name' \
              --output tsv)
            echo "webAppName=$APP_NAME" >> "$GITHUB_OUTPUT"
            echo "Resolved from Azure: $APP_NAME"
          fi

  # -----------------------------------------------------------------------
  # Job 4: Deploy Application to Azure Web App
  # Pre-builds deps on runner → zips production files → zip-deploys to Azure
  # Skips Oryx remote build for ~10 min faster deploys
  # -----------------------------------------------------------------------
  deploy:
    name: Deploy to Azure Web App
    runs-on: ubuntu-latest
    needs: resolve

    environment:
      name: production
      url: ${{ steps.deploy-app.outputs.webapp-url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies (pre-build for Azure)
        run: |
          pip install -r requirements.txt --target=.python_packages/lib/site-packages --quiet

      - name: Create deployment package
        run: |
          zip -r deploy.zip \
            app/ \
            .python_packages/ \
            requirements.txt \
            startup.sh \
            -x "app/__pycache__/*" "app/**/__pycache__/*" "*.pyc"
          echo "📦 Package size: $(du -h deploy.zip | cut -f1)"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          auth-type: SERVICE_PRINCIPAL

      - name: Deploy to Azure Web App
        id: deploy-app
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ needs.resolve.outputs.webAppName }}
          package: deploy.zip

      - name: Verify deployment
        run: |
          echo "Waiting for app to start..."
          sleep 30

          url="${{ steps.deploy-app.outputs.webapp-url }}/health"
          echo "Checking health at: $url"

          status=$(curl -s -o /dev/null -w "%{http_code}" "$url" || echo "000")
          if [ "$status" = "200" ]; then
            echo "✅ Health check passed (HTTP $status)"
          else
            echo "⚠️ Health check returned HTTP $status (app may still be starting)"
          fi

          echo "### 🏥 Deployment Health Check" >> "$GITHUB_STEP_SUMMARY"
          echo "- **URL**: $url" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status**: HTTP $status" >> "$GITHUB_STEP_SUMMARY"
