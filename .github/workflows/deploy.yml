# ---------------------------------------------------------------------------
# PlagiarismGuard — CI/CD Pipeline (Optimized)
# Smart conditional execution based on what changed:
#   - infra/** changed  → provision infra + deploy app (skip tests)
#   - app/tests/etc     → run tests + deploy app (skip infra)
#   - both changed      → tests + infra + deploy
#
# Speed optimisations:
#   1. .python_packages/ cached across runs (keyed on requirements-prod.txt)
#   2. Bloat stripped from packages (tests, docs, *.dist-info) → smaller zip
#   3. resolve job merged into deploy (one fewer runner spin-up)
#   4. Prod-only deps (no pytest in deploy package)
#   5. Health-check uses retry loop instead of blind sleep 30
# ---------------------------------------------------------------------------

name: CI/CD — Build, Test & Deploy to Azure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.13"
  AZURE_RESOURCE_GROUP: "rg-plagiarismguard"
  AZURE_LOCATION: "eastus"

jobs:
  # -----------------------------------------------------------------------
  # Job 0: Detect what changed
  # -----------------------------------------------------------------------
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      app: ${{ steps.filter.outputs.app }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            infra:
              - 'infra/**'
            app:
              - 'app/**'
              - 'tests/**'
              - 'requirements.txt'
              - 'requirements-prod.txt'
              - 'startup.sh'
              - 'static/**'
              - 'openai-foundry.json'

  # -----------------------------------------------------------------------
  # Job 1: Test (only when app code changed)
  # -----------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.app == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  # -----------------------------------------------------------------------
  # Job 2: Provision Infrastructure (only when infra changed)
  # -----------------------------------------------------------------------
  infra:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.infra == 'true')

    outputs:
      webAppName: ${{ steps.deploy-bicep.outputs.webAppName }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          auth-type: SERVICE_PRINCIPAL

      - name: Create Resource Group (if needed)
        uses: azure/cli@v2
        with:
          inlineScript: |
            az group create \
              --name ${{ env.AZURE_RESOURCE_GROUP }} \
              --location ${{ env.AZURE_LOCATION }} \
              --tags project=plagiarismguard environment=production

      - name: Validate Bicep template
        uses: azure/cli@v2
        with:
          inlineScript: |
            az deployment group validate \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --template-file infra/main.bicep \
              --parameters @infra/parameters.json

      - name: Deploy Bicep template
        id: deploy-bicep
        uses: azure/cli@v2
        with:
          inlineScript: |
            result=$(az deployment group create \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --template-file infra/main.bicep \
              --parameters @infra/parameters.json \
              --parameters bingApiKey='${{ secrets.PG_BING_API_KEY }}' \
              --query 'properties.outputs' \
              --output json)

            webAppName=$(echo $result | jq -r '.webAppName.value')
            webAppUrl=$(echo $result | jq -r '.webAppUrl.value')

            echo "webAppName=$webAppName" >> "$GITHUB_OUTPUT"
            echo "webAppUrl=$webAppUrl" >> "$GITHUB_OUTPUT"
            echo "### 🚀 Infrastructure Deployed" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Web App**: $webAppName" >> "$GITHUB_STEP_SUMMARY"
            echo "- **URL**: $webAppUrl" >> "$GITHUB_STEP_SUMMARY"

  # -----------------------------------------------------------------------
  # -----------------------------------------------------------------------
  # Job 3: Deploy Application to Azure Web App
  # - Deploys ONLY app code (~100 KB zip) — fast upload, no 504 timeout
  # - Dependencies are installed by startup.sh into a persistent venv
  #   at /home/site/venv/ (cached across restarts, ~5 min first boot)
  # - Resolves app name inline (no separate job)
  # -----------------------------------------------------------------------
  deploy:
    name: Deploy to Azure Web App
    runs-on: ubuntu-latest
    needs: [changes, test, infra]
    if: >-
      always() &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'workflow_dispatch' ||
       needs.changes.outputs.app == 'true' ||
       needs.changes.outputs.infra == 'true') &&
      !contains(needs.*.result, 'failure')

    environment:
      name: production
      url: ${{ steps.deploy-app.outputs.webapp-url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # -- Resolve Web App name (from infra output or Azure query) ---------
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          auth-type: SERVICE_PRINCIPAL

      - name: Resolve Web App name
        id: resolve-name
        run: |
          INFRA_NAME="${{ needs.infra.outputs.webAppName }}"
          if [ -n "$INFRA_NAME" ] && [ "$INFRA_NAME" != "" ]; then
            echo "webAppName=$INFRA_NAME" >> "$GITHUB_OUTPUT"
            echo "Resolved from infra job: $INFRA_NAME"
          else
            APP_NAME=$(az webapp list \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --query '[0].name' \
              --output tsv)
            echo "webAppName=$APP_NAME" >> "$GITHUB_OUTPUT"
            echo "Resolved from Azure: $APP_NAME"
          fi

      # -- Package app code only (deps installed by startup.sh) -----------
      - name: Create deployment package
        run: |
          chmod +x startup.sh
          zip -r -q deploy.zip \
            app/ \
            openai-foundry.json \
            requirements-prod.txt \
            startup.sh \
            -x "app/__pycache__/*" "app/**/__pycache__/*" "*.pyc"
          echo "📦 Package size: $(du -h deploy.zip | cut -f1)"
          echo "📋 Zip contents:"
          unzip -l deploy.zip | tail -5

      - name: Ensure startup command is set
        run: |
          az webapp config set \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ steps.resolve-name.outputs.webAppName }} \
            --startup-file "bash /home/site/wwwroot/startup.sh" \
            --output none

      - name: Deploy to Azure Web App
        id: deploy-app
        run: |
          echo "Uploading deploy.zip ($(du -h deploy.zip | cut -f1))..."

          az webapp deploy \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ steps.resolve-name.outputs.webAppName }} \
            --src-path deploy.zip \
            --type zip \
            --clean true \
            --async true

          echo "🔄 Restarting app..."
          az webapp restart \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ steps.resolve-name.outputs.webAppName }}

          WEBAPP_URL=$(az webapp show \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ steps.resolve-name.outputs.webAppName }} \
            --query defaultHostName --output tsv)
          echo "webapp-url=https://$WEBAPP_URL" >> "$GITHUB_OUTPUT"

      # -- Health check (first deploy takes ~8 min for pip install) --------
      - name: Verify deployment
        run: |
          url="${{ steps.deploy-app.outputs.webapp-url }}/health"
          echo "Waiting for app at: $url"
          echo "⏳ First deploy installs deps (~10-16 min). Polling for 20 min..."

          for i in $(seq 1 120); do
            sleep 10
            status=$(curl -s -o /dev/null -w "%{http_code}" "$url" || echo "000")
            echo "  Attempt $i/120 → HTTP $status  ($(( i * 10 ))s elapsed)"
            if [ "$status" = "200" ]; then
              echo "✅ Health check passed!"
              curl -s "$url" | head -5
              exit 0
            fi
          done

          echo "⚠️ App did not return 200 after 1200s"
          echo "   This may be normal for the first deploy (installing ML deps)."
          echo "   Check Docker logs: az webapp log tail -g ${{ env.AZURE_RESOURCE_GROUP }} -n ${{ steps.resolve-name.outputs.webAppName }}"

          echo "### 🏥 Deployment Health Check" >> "$GITHUB_STEP_SUMMARY"
          echo "- **URL**: $url" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status**: HTTP $status (may still be installing dependencies)" >> "$GITHUB_STEP_SUMMARY"
