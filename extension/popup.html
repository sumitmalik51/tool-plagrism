<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PlagiarismGuard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #1e293b;
    }
    .header svg { width: 28px; height: 28px; }
    .header h1 { font-size: 16px; font-weight: 700; }
    .header .version { font-size: 11px; color: #64748b; margin-left: auto; }

    /* Settings section */
    .settings { margin-bottom: 16px; }
    .settings label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
    .settings input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #334155;
      border-radius: 6px;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    .settings input:focus { border-color: #6366f1; }
    .settings .row { margin-bottom: 10px; }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 8px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-secondary {
      background: #1e293b;
      color: #94a3b8;
      border: 1px solid #334155;
    }
    .btn-secondary:hover { background: #334155; color: #e2e8f0; }

    /* Status */
    .status {
      font-size: 12px;
      padding: 8px 10px;
      border-radius: 6px;
      margin-bottom: 12px;
      display: none;
    }
    .status.success { display: block; background: #064e3b; color: #6ee7b7; }
    .status.error { display: block; background: #7f1d1d; color: #fca5a5; }
    .status.info { display: block; background: #1e3a5f; color: #93c5fd; }

    /* Results */
    .results {
      display: none;
      background: #1e293b;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .results.visible { display: block; }
    .results h3 { font-size: 13px; margin-bottom: 10px; color: #94a3b8; }
    .score-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #334155;
    }
    .score-row:last-child { border-bottom: none; }
    .score-label { font-size: 12px; color: #94a3b8; }
    .score-value { font-size: 14px; font-weight: 700; }
    .score-low { color: #6ee7b7; }
    .score-medium { color: #fbbf24; }
    .score-high { color: #f87171; }

    .model-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      background: #312e81;
      color: #a5b4fc;
      margin: 2px;
    }

    /* Word count */
    .word-info {
      font-size: 11px;
      color: #64748b;
      text-align: center;
      margin-bottom: 8px;
    }

    /* Loading */
    .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid #334155;
      border-top: 2px solid #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 8px;
    }
    .spinner.active { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      text-align: center;
      font-size: 11px;
      color: #475569;
      padding-top: 8px;
      border-top: 1px solid #1e293b;
    }
    .footer a { color: #6366f1; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <h1>PlagiarismGuard</h1>
    <span class="version">v1.0</span>
  </div>

  <div class="settings">
    <div class="row">
      <label for="serverUrl">Server URL</label>
      <input type="url" id="serverUrl" placeholder="https://your-app.azurewebsites.net">
    </div>
    <div class="row">
      <label for="apiKey">API Key</label>
      <input type="password" id="apiKey" placeholder="pg_xxxxxxxxxxxx">
    </div>
  </div>

  <button class="btn btn-secondary" id="saveBtn">Save Settings</button>

  <div id="status" class="status"></div>

  <div class="word-info" id="wordInfo"></div>
  <div class="spinner" id="spinner"></div>

  <button class="btn btn-primary" id="scanBtn" disabled>Scan Selected Text</button>
  <button class="btn btn-secondary" id="scanPageBtn" disabled>Quick Scan Full Page</button>

  <div class="results" id="results">
    <h3>Scan Results</h3>
    <div class="score-row">
      <span class="score-label">Plagiarism Score</span>
      <span class="score-value" id="plagScore">—</span>
    </div>
    <div class="score-row">
      <span class="score-label">AI Detection Score</span>
      <span class="score-value" id="aiScore">—</span>
    </div>
    <div class="score-row">
      <span class="score-label">Risk Level</span>
      <span class="score-value" id="riskLevel">—</span>
    </div>
    <div class="score-row">
      <span class="score-label">Confidence</span>
      <span class="score-value" id="confidence">—</span>
    </div>
    <div id="modelAttribution" style="display:none; padding-top:8px;">
      <span class="score-label">Suspected AI Models</span>
      <div id="modelTags" style="margin-top:4px;"></div>
    </div>
  </div>

  <div class="footer">
    Powered by <a href="https://plagiarismguard.ai" target="_blank">PlagiarismGuard</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
